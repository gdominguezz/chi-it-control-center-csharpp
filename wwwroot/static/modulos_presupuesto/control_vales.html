<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CONTROL DE VALES</title>
<style>
body{font-family:Arial;margin:0;background:#f1f5f9;}
.header{background:#1e293b;color:white;padding:15px;font-size:20px;font-weight:bold;}
.container{padding:15px;}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:15px;}
.field{display:flex;flex-direction:column;}
.field label{font-size:11px;font-weight:bold;color:#1e293b;margin-bottom:4px;text-transform:uppercase;}
.field input{padding:7px;border:1px solid #cbd5e1;border-radius:5px;font-size:12px;background:#f8fafc;}
.field textarea{padding:7px;border:1px solid #cbd5e1;border-radius:5px;font-size:12px;background:#f8fafc;resize:vertical;min-height:60px;}
.field input:focus,.field textarea:focus{outline:none;border-color:#2563eb;background:white;}
button{padding:6px 12px;border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:bold;margin-right:5px;}
.save{background:#16a34a;color:white;}.cancel{background:#64748b;color:white;}.delete{background:#dc2626;color:white;}
.edit{background:#f59e0b;color:white;}.pdf{background:#2563eb;color:white;}.export{background:#7c3aed;color:white;}
.back{background:#dc2626;color:white;font-style:italic;}
.btn-bar{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:12px;}
.btn-bar input[type="number"]{padding:6px;border:1px solid #ccc;border-radius:5px;font-size:12px;width:110px;}
.table-container{width:100%;height:500px;overflow:auto;border:1px solid #ccc;background:white;}
table{border-collapse:collapse;min-width:3200px;font-size:11px;}
th,td{border:1px solid #ccc;padding:6px;white-space:nowrap;text-align:center;}
th{background:#1e293b;color:white;position:sticky;top:0;z-index:2;}
.filter-row input{width:100%;font-size:11px;}
.pagination{margin-top:10px;}
/* Colores por ESTADO */
tr.estado-baja td{background:#fee2e2;}
tr.estado-activo td{background:#dcfce7;}
</style>
</head>
<body>
<div class="header">CONTROL DE VALES</div>
<div class="container">

<div class="form-grid">
  <div class="field"><label>No. Empleado</label><input id="NO_EMPLEADO"></div>
  <div class="field"><label>Folio</label><input id="FOLIO"></div>
  <div class="field"><label>Nombre</label><input id="NOMBRE"></div>
  <div class="field"><label>Puesto</label><input id="PUESTO"></div>
  <div class="field"><label>Dispositivo</label><input id="DISPOSITIVO"></div>
  <div class="field"><label>Descripcion</label><input id="DESCRIPCION"></div>
  <div class="field"><label>Marca</label><input id="MARCA"></div>
  <div class="field"><label>Modelo</label><input id="MODELO"></div>
  <div class="field"><label>Numero Serie</label><input id="NUMERO_SERIE"></div>
  <div class="field"><label>Fecha Asignacion</label><input id="FECHA_ASIGNACION" type="date"></div>
  <div class="field"><label>Fecha Cancelacion</label><input id="FECHA_CANCELACION" type="date"></div>
  <div class="field"><label>Estado</label><input id="ESTADO"></div>
  <div class="field"><label>Motivo</label><input id="MOTIVO"></div>
  <div class="field"><label>Asignado Por</label><input id="ASIGNADO_POR"></div>
  <div class="field"><label>Recibido Por</label><input id="RECIBIDO_POR"></div>
  <div class="field" style="grid-column:span 2"><label>Observaciones</label><textarea id="OBSERVACIONES"></textarea></div>
  <div class="field" style="grid-column:span 3"><label>Accesorios</label><textarea id="ACCESORIOS"></textarea></div>
</div>

<div class="btn-bar">
  <button class="save" onclick="guardar()">GUARDAR / ACTUALIZAR</button>
  <button class="cancel" onclick="cancelarEdicion()">CANCELAR</button>
</div>
<div class="btn-bar">
  <button class="export" onclick="exportarFiltrado()">Exportar Filtrado</button>
  <button class="export" onclick="exportarTodo()">Exportar Todo</button>
  <input type="number" id="anioExportar" placeholder="Año (ej: 2026)">
  <button class="export" onclick="exportarPorAnio()">Exportar por Año</button>
  <button class="back" onclick="window.location.href='menu.html'">REGRESAR AL MENÚ</button>
</div>

<div class="table-container">
<table>
<thead>
<tr>
  <th>ID</th><th>NO EMP</th><th>FOLIO</th><th>NOMBRE</th><th>PUESTO</th>
  <th>DISPOSITIVO</th><th>DESCRIPCION</th><th>MARCA</th><th>MODELO</th>
  <th>NO SERIE</th><th>F.ASIGNACION</th><th>F.CANCELACION</th>
  <th>ESTADO</th><th>MOTIVO</th><th>ASIGNADO POR</th><th>RECIBIDO POR</th>
  <th>OBSERVACIONES</th><th>ACCESORIOS</th><th>PDF</th><th>ACCIONES</th>
</tr>
<tr class="filter-row">
  <th></th>
  <th><input oninput="filtrar()"></th><!-- f[0]  NO_EMPLEADO -->
  <th><input oninput="filtrar()"></th><!-- f[1]  FOLIO -->
  <th><input oninput="filtrar()"></th><!-- f[2]  NOMBRE -->
  <th><input oninput="filtrar()"></th><!-- f[3]  PUESTO -->
  <th><input oninput="filtrar()"></th><!-- f[4]  DISPOSITIVO -->
  <th><input oninput="filtrar()"></th><!-- f[5]  DESCRIPCION -->
  <th><input oninput="filtrar()"></th><!-- f[6]  MARCA -->
  <th><input oninput="filtrar()"></th><!-- f[7]  MODELO -->
  <th><input oninput="filtrar()"></th><!-- f[8]  NUMERO_SERIE -->
  <th><input oninput="filtrar()"></th><!-- f[9]  FECHA_ASIGNACION -->
  <th><input oninput="filtrar()"></th><!-- f[10] FECHA_CANCELACION -->
  <th><input oninput="filtrar()"></th><!-- f[11] ESTADO -->
  <th><input oninput="filtrar()"></th><!-- f[12] MOTIVO -->
  <th><input oninput="filtrar()"></th><!-- f[13] ASIGNADO_POR -->
  <th><input oninput="filtrar()"></th><!-- f[14] RECIBIDO_POR -->
  <th><input oninput="filtrar()"></th><!-- f[15] OBSERVACIONES -->
  <th><input oninput="filtrar()"></th><!-- f[16] ACCESORIOS -->
  <th></th><th></th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

<div class="pagination">
  <button onclick="anterior()">Anterior</button>
  <span id="paginaInfo"></span>
  <button onclick="siguiente()">Siguiente</button>
</div>
</div>

<script>
let paginaActual=1, limite=10, totalRegistros=0, editandoID=null;

function guardar(){
    let ids=['NO_EMPLEADO','FOLIO','NOMBRE','PUESTO','DISPOSITIVO','DESCRIPCION',
             'MARCA','MODELO','NUMERO_SERIE','FECHA_ASIGNACION','FECHA_CANCELACION',
             'ESTADO','MOTIVO','ASIGNADO_POR','RECIBIDO_POR','OBSERVACIONES','ACCESORIOS'];
    let data={};
    ids.forEach(k=>{let el=document.getElementById(k); data[k]=el&&el.value?el.value:null;});
    if(editandoID){
        fetch(`/CONTROL_VALES/${editandoID}`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)})
        .then(()=>{editandoID=null;limpiarFormulario();cargar();});
    } else {
        fetch("/CONTROL_VALES",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)})
        .then(()=>{limpiarFormulario();cargar();});
    }
}

function limpiarFormulario(){document.querySelectorAll(".form-grid input,.form-grid textarea").forEach(i=>i.value="");}
function cancelarEdicion(){editandoID=null;limpiarFormulario();}

function obtenerParametros(){
    let f=document.querySelectorAll(".filter-row input");
    return new URLSearchParams({
        page:paginaActual,limit:limite,
        NO_EMPLEADO:f[0].value,FOLIO:f[1].value,NOMBRE:f[2].value,
        PUESTO:f[3].value,DISPOSITIVO:f[4].value,DESCRIPCION:f[5].value,
        MARCA:f[6].value,MODELO:f[7].value,NUMERO_SERIE:f[8].value,
        FECHA_ASIGNACION:f[9].value,FECHA_CANCELACION:f[10].value,
        ESTADO:f[11].value,MOTIVO:f[12].value,ASIGNADO_POR:f[13].value,
        RECIBIDO_POR:f[14].value,OBSERVACIONES:f[15].value,ACCESORIOS:f[16].value
    });
}

function cargar(){
    fetch(`/CONTROL_VALES?${obtenerParametros()}`)
    .then(r=>r.json()).then(resp=>{totalRegistros=resp.total;renderizar(resp.data);});
}

function renderizar(datos){
    tabla.innerHTML="";
    datos.forEach(row=>{
        let estado=String(row.ESTADO??"").trim().toLowerCase();
        let clase="";
        if(estado.includes("baja")) clase="estado-baja";
        else if(estado===""||estado==="activo") clase="estado-activo";

        tabla.innerHTML+=`<tr class="${clase}">
        <td>${row.ID}</td><td>${row.NO_EMPLEADO??""}</td><td>${row.FOLIO??""}</td>
        <td>${row.NOMBRE??""}</td><td>${row.PUESTO??""}</td><td>${row.DISPOSITIVO??""}</td>
        <td>${row.DESCRIPCION??""}</td><td>${row.MARCA??""}</td><td>${row.MODELO??""}</td>
        <td>${row.NUMERO_SERIE??""}</td><td>${row.FECHA_ASIGNACION??""}</td>
        <td>${row.FECHA_CANCELACION??""}</td><td>${row.ESTADO??""}</td>
        <td>${row.MOTIVO??""}</td><td>${row.ASIGNADO_POR??""}</td>
        <td>${row.RECIBIDO_POR??""}</td><td>${row.OBSERVACIONES??""}</td>
        <td>${row.ACCESORIOS??""}</td>
        <td>${row.TIENE_PDF
            ?`<button class="pdf" onclick="verPDF(${row.ID})">Ver</button><button class="delete" onclick="eliminarPDF(${row.ID})">Quitar</button>`
            :`<input type="file" onchange="subirPDF(${row.ID},this)">`}</td>
        <td><button class="edit" onclick='editar(${JSON.stringify(row)})'>Editar</button>
        <button class="delete" onclick="eliminar(${row.ID})">Eliminar</button></td>
        </tr>`;
    });
    paginaInfo.innerText=`Pagina ${paginaActual} de ${Math.ceil(totalRegistros/limite)} | Total: ${totalRegistros}`;
}

function editar(row){editandoID=row.ID;Object.keys(row).forEach(k=>{let el=document.getElementById(k);if(el)el.value=row[k]??""});window.scrollTo({top:0,behavior:"smooth"});}
function eliminar(id){if(!confirm("¿Eliminar este vale?"))return;fetch(`/CONTROL_VALES/${id}`,{method:"DELETE"}).then(()=>cargar());}
function subirPDF(id,input){let fd=new FormData();fd.append("file",input.files[0]);fetch(`/CONTROL_VALES/PDF/${id}`,{method:"POST",body:fd}).then(()=>cargar());}
function verPDF(id){window.open(`/CONTROL_VALES/PDF/${id}`,"_blank");}
function eliminarPDF(id){if(!confirm("¿Eliminar PDF?"))return;fetch(`/CONTROL_VALES/PDF/${id}`,{method:"DELETE"}).then(()=>cargar());}
function filtrar(){paginaActual=1;cargar();}
function exportarFiltrado(){window.open(`/CONTROL_VALES/EXPORTAR?${obtenerParametros()}`);}
function exportarTodo(){window.open(`/CONTROL_VALES/EXPORTAR_TODO`);}
function exportarPorAnio(){let a=document.getElementById("anioExportar").value;if(!a){alert("Ingresa un año");return;}window.open(`/CONTROL_VALES/EXPORTAR_ANIO?anio=${a}`);}
function siguiente(){if(paginaActual*limite<totalRegistros){paginaActual++;cargar();}}
function anterior(){if(paginaActual>1){paginaActual--;cargar();}}
cargar();
</script>
</body>
</html>
