<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ORDENES DE COMPRA</title>

<style>
body{
    font-family:Arial;
    margin:0;
    background:#f1f5f9;
}

.header{
    background:#1e293b;
    color:white;
    padding:15px;
    font-size:20px;
    font-weight:bold;
}


.container{
    padding:15px;
}
.back{
    background:#dc2626;
    font-style: italic; color:#ffffff;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:12px;
    margin-bottom:15px;
}

.field{
    display:flex;
    flex-direction:column;
}

.field label{
    font-size:11px;
    font-weight:bold;
    color:#1e293b;
    margin-bottom:4px;
    text-transform:uppercase;
    letter-spacing:0.3px;
}

.field input{
    padding:7px;
    border:1px solid #cbd5e1;
    border-radius:5px;
    font-size:12px;
    background:#f8fafc;
    transition:border-color 0.2s;
}

.field input:focus{
    outline:none;
    border-color:#2563eb;
    background:white;
    box-shadow:0 0 0 2px rgba(37,99,235,0.15);
}

button{
    padding:6px 12px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:12px;
    font-weight:bold;
    margin-right:5px;
}

.save{background:#16a34a;color:white;}
.cancel{background:#64748b;color:white;}
.delete{background:#dc2626;color:white;}
.edit{background:#f59e0b;color:white;}
.pdf{background:#2563eb;color:white;}
.export{background:#7c3aed;color:white;}

.btn-bar{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    gap:8px;
    margin-bottom:12px;
}

.btn-bar input[type="number"]{
    padding:6px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:12px;
    width:110px;
}

.table-container{
    width:100%;
    height:500px;
    overflow:auto;
    border:1px solid #ccc;
    background:white;
}

table{
    border-collapse:collapse;
    min-width:5000px;
    font-size:11px;
}

th,td{
    border:1px solid #ccc;
    padding:6px;
    white-space:nowrap;
    text-align:center;
}

th{
    background:#1e293b;
    color:white;
    position:sticky;
    top:0;
    z-index:2;
}

.filter-row input{
    width:100%;
    font-size:11px;
}

.pagination{
    margin-top:10px;
}
</style>
</head>

<body>

<div class="header">ORDENES DE COMPRA</div>

<div class="container">

<div class="form-grid">

<div class="field">
    <label>Orden de Compra</label>
    <input id="ORDEN_DE_COMPRA">
</div>

<div class="field">
    <label>Folio (Correctivo / Solicitud / Inventario)</label>
    <input id="FOLIO_CORRECTIVO_SOLICITUD_INVENTARIO">
</div>

<div class="field">
    <label>Solicitante</label>
    <input id="SOLICITANTE">
</div>

<div class="field">
    <label>Presupuesto (Mes)</label>
    <input id="PRESUPUESTO_MES">
</div>

<div class="field">
    <label>Serie / Ubicación / No. Empleado</label>
    <input id="SERIE_UBICACION_NO_EMPLEADO">
</div>

<div class="field">
    <label>Accesorio Solicitado</label>
    <input id="ACCESORIO_SOLICITADO">
</div>

<div class="field">
    <label>Proveedor Elegido</label>
    <input id="PROVEEDOR_ELEGIDO">
</div>

<div class="field">
    <label>Pieza / Servicio</label>
    <input id="PIEZA_SERVICIO">
</div>

<div class="field">
    <label>Cantidad</label>
    <input id="CANTIDAD" type="number">
</div>

<div class="field">
    <label>Precio Unitario</label>
    <input id="PRECIO_UNITARIO" type="number" step="0.01">
</div>

<div class="field">
    <label>Total (No incluye IVA)</label>
    <input id="TOTAL_NO_INCLUYE_IVA" type="number" step="0.01">
</div>

<div class="field">
    <label>Moneda</label>
    <input id="MONEDA">
</div>

<div class="field">
    <label>Comentarios</label>
    <input id="COMENTARIOS">
</div>

<div class="field">
    <label>Requisición</label>
    <input id="REQUISICION">
</div>

<div class="field">
    <label>Fecha OC</label>
    <input id="FECHA_OC" type="date">
</div>

<div class="field">
    <label>OC</label>
    <input id="OC">
</div>

<div class="field">
    <label>Fecha Entrada</label>
    <input id="FECHA_ENTRADA" type="date">
</div>

<div class="field">
    <label>Cantidad Registrada</label>
    <input id="CANTIDAD_REGISTRADA" type="number">
</div>

<div class="field">
    <label>Estatus OC</label>
    <input id="ESTATUS_OC">
</div>

<div class="field">
    <label>Hoja Control</label>
    <input id="HOJA_CONTROL">
</div>

</div>

<div class="btn-bar">
    <button class="save" onclick="guardar()">GUARDAR / ACTUALIZAR</button>
    <button class="cancel" onclick="cancelarEdicion()">CANCELAR</button>
</div>

<div class="btn-bar">
    <button class="export" onclick="exportarFiltrado()">Exportar Filtrado</button>
    <button class="export" onclick="exportarTodo()">Exportar Todo</button>
    <input type="number" id="anioExportar" placeholder="Año (ej: 2026)">
    <button class="export" onclick="exportarPorAnio()">Exportar por Año</button>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>ID</th>
<th>ORDEN DE COMPRA</th>
<th>FOLIO</th>
<th>SOLICITANTE</th>
<th>PRESUPUESTO</th>
<th>SERIE/UBICACION</th>
<th>ACCESORIO</th>
<th>PROVEEDOR</th>
<th>PIEZA/SERVICIO</th>
<th>CANTIDAD</th>
<th>PRECIO UNITARIO</th>
<th>TOTAL SIN IVA</th>
<th>MONEDA</th>
<th>COMENTARIOS</th>
<th>REQUISICION</th>
<th>FECHA OC</th>
<th>OC</th>
<th>FECHA ENTRADA</th>
<th>CANTIDAD REG</th>
<th>ESTATUS</th>
<th>HOJA CONTROL</th>
<th>PDF</th>
<th>ACCIONES</th>
</tr>

<tr class="filter-row">
<th></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th></th>
<th></th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

<div class="pagination">
<button onclick="anterior()">Anterior</button>
<span id="paginaInfo"></span>
<button onclick="siguiente()">Siguiente</button>
<button class="back" onclick="window.location.href='presupuestos_menu.html'">
REGRESAR A PRESUPUESTOS
</button>
</div>

</div>

<script>

let paginaActual = 1;
let limite = 10;
let totalRegistros = 0;
let editandoID = null;
let datosOriginales = [];
let datosFiltrados = [];

function guardar(){
    let data = {
        ORDEN_DE_COMPRA:                      ORDEN_DE_COMPRA.value                      || null,
        FOLIO_CORRECTIVO_SOLICITUD_INVENTARIO: FOLIO_CORRECTIVO_SOLICITUD_INVENTARIO.value || null,
        SOLICITANTE:                           SOLICITANTE.value                           || null,
        PRESUPUESTO_MES:                       PRESUPUESTO_MES.value                       || null,
        SERIE_UBICACION_NO_EMPLEADO:           SERIE_UBICACION_NO_EMPLEADO.value           || null,
        ACCESORIO_SOLICITADO:                  ACCESORIO_SOLICITADO.value                  || null,
        PROVEEDOR_ELEGIDO:                     PROVEEDOR_ELEGIDO.value                     || null,
        PIEZA_SERVICIO:                        PIEZA_SERVICIO.value                        || null,
        CANTIDAD:                              CANTIDAD.value                              || null,
        PRECIO_UNITARIO:                       PRECIO_UNITARIO.value                       || null,
        TOTAL_NO_INCLUYE_IVA:                  TOTAL_NO_INCLUYE_IVA.value                  || null,
        MONEDA:                                MONEDA.value                                || null,
        COMENTARIOS:                           COMENTARIOS.value                           || null,
        REQUISICION:                           REQUISICION.value                           || null,
        FECHA_OC:                              FECHA_OC.value                              || null,
        OC:                                    OC.value                                    || null,
        FECHA_ENTRADA:                         FECHA_ENTRADA.value                         || null,
        CANTIDAD_REGISTRADA:                   CANTIDAD_REGISTRADA.value                   || null,
        ESTATUS_OC:                            ESTATUS_OC.value                            || null,
        HOJA_CONTROL:                          HOJA_CONTROL.value                          || null
    };

    if(editandoID){
        fetch(`/ORDENES_DE_COMPRA/${editandoID}`,{
            method:"PUT",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify(data)
        }).then(()=>{ editandoID=null; limpiarFormulario(); cargar(); });
    } else {
        fetch("/ORDENES_DE_COMPRA",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify(data)
        }).then(()=>{ limpiarFormulario(); cargar(); });
    }
}

function limpiarFormulario(){
    document.querySelectorAll(".form-grid input").forEach(i=>i.value="");
}

function cancelarEdicion(){
    editandoID = null;
    limpiarFormulario();
}

function obtenerParametros(){
    let f = document.querySelectorAll(".filter-row input");
    return new URLSearchParams({
        page:                                  paginaActual,
        limit:                                 limite,
        ORDEN_DE_COMPRA:                       f[0].value,
        FOLIO_CORRECTIVO_SOLICITUD_INVENTARIO: f[1].value,
        SOLICITANTE:                           f[2].value,
        PRESUPUESTO_MES:                       f[3].value,
        SERIE_UBICACION_NO_EMPLEADO:           f[4].value,
        ACCESORIO_SOLICITADO:                  f[5].value,
        PROVEEDOR_ELEGIDO:                     f[6].value,
        PIEZA_SERVICIO:                        f[7].value,
        CANTIDAD:                              f[8].value,
        PRECIO_UNITARIO:                       f[9].value,
        TOTAL_NO_INCLUYE_IVA:                  f[10].value,
        MONEDA:                                f[11].value,
        COMENTARIOS:                           f[12].value,
        REQUISICION:                           f[13].value,
        FECHA_OC:                              f[14].value,
        OC:                                    f[15].value,
        FECHA_ENTRADA:                         f[16].value,
        CANTIDAD_REGISTRADA:                   f[17].value,
        ESTATUS_OC:                            f[18].value,
        HOJA_CONTROL:                          f[19].value
    });
}

function cargar(){
    let params = obtenerParametros();
    fetch(`/ORDENES_DE_COMPRA?${params.toString()}`)
    .then(res=>res.json())
    .then(resp=>{
        totalRegistros = resp.total;
        datosOriginales = resp.data;
        datosFiltrados = [...datosOriginales];
        renderizar();
    });
}

function renderizar(){
    tabla.innerHTML="";
    datosFiltrados.forEach(row=>{
        tabla.innerHTML+=`
        <tr>
        <td>${row.ID}</td>
        <td>${row.ORDEN_DE_COMPRA??""}</td>
        <td>${row.FOLIO_CORRECTIVO_SOLICITUD_INVENTARIO??""}</td>
        <td>${row.SOLICITANTE??""}</td>
        <td>${row.PRESUPUESTO_MES??""}</td>
        <td>${row.SERIE_UBICACION_NO_EMPLEADO??""}</td>
        <td>${row.ACCESORIO_SOLICITADO??""}</td>
        <td>${row.PROVEEDOR_ELEGIDO??""}</td>
        <td>${row.PIEZA_SERVICIO??""}</td>
        <td>${row.CANTIDAD??""}</td>
        <td>${row.PRECIO_UNITARIO??""}</td>
        <td>${row.TOTAL_NO_INCLUYE_IVA??""}</td>
        <td>${row.MONEDA??""}</td>
        <td>${row.COMENTARIOS??""}</td>
        <td>${row.REQUISICION??""}</td>
        <td>${row.FECHA_OC??""}</td>
        <td>${row.OC??""}</td>
        <td>${row.FECHA_ENTRADA??""}</td>
        <td>${row.CANTIDAD_REGISTRADA??""}</td>
        <td>${row.ESTATUS_OC??""}</td>
        <td>${row.HOJA_CONTROL??""}</td>
        <td>
        ${row.TIENE_PDF
        ? `<button class="pdf" onclick="verPDF(${row.ID})">Ver PDF</button>
           <button class="delete" onclick="eliminarPDF(${row.ID})">Quitar</button>`
        : `<input type="file" onchange="subirPDF(${row.ID},this)">`
        }
        </td>
        <td>
        <button class="edit" onclick='editar(${JSON.stringify(row)})'>Editar</button>
        <button class="delete" onclick="eliminar(${row.ID})">Eliminar</button>
        </td>
        </tr>`;
    });
    paginaInfo.innerText=`Página ${paginaActual} de ${Math.ceil(totalRegistros/limite)}`;
}

function editar(row){
    editandoID = row.ID;
    Object.keys(row).forEach(key=>{
        if(document.getElementById(key)){
            document.getElementById(key).value = row[key] ?? "";
        }
    });
    window.scrollTo({top:0, behavior:"smooth"});
}

function eliminar(id){
    if(!confirm("¿Eliminar este registro?")) return;
    fetch(`/ORDENES_DE_COMPRA/${id}`,{method:"DELETE"}).then(()=>cargar());
}

function subirPDF(id, input){
    let file = input.files[0];
    if(!file) return;
    let formData = new FormData();
    formData.append("file", file);
    fetch(`/ORDENES_DE_COMPRA/PDF/${id}`,{method:"POST", body:formData})
    .then(()=>cargar());
}

function verPDF(id){
    window.open(`/ORDENES_DE_COMPRA/PDF/${id}`,"_blank");
}

function eliminarPDF(id){
    if(!confirm("¿Seguro que deseas eliminar el PDF?")) return;
    fetch(`/ORDENES_DE_COMPRA/PDF/${id}`,{method:"DELETE"})
    .then(()=>cargar());
}

function filtrar(){
    paginaActual = 1;
    cargar();
}

function exportarFiltrado(){
    let params = obtenerParametros();
    window.open(`/ORDENES_DE_COMPRA/EXPORTAR?${params.toString()}`);
}

function exportarTodo(){
    window.open(`/ORDENES_DE_COMPRA/EXPORTAR_TODO`);
}

function exportarPorAnio(){
    let anio = document.getElementById("anioExportar").value;
    if(!anio){ alert("Ingresa un año"); return; }
    window.open(`/ORDENES_DE_COMPRA/EXPORTAR_ANIO?anio=${anio}`);
}

function siguiente(){
    if(paginaActual*limite<totalRegistros){ paginaActual++; cargar(); }
}

function anterior(){
    if(paginaActual>1){ paginaActual--; cargar(); }
}

cargar();

</script>

</body>
</html>
