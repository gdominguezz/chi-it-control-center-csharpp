<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>REQ vs ORDEN DE COMPRA</title>

    <style>
        /* ── Reset & base ────────────────────────────────────────────── */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial,sans-serif;
            background: #f1f5f9;
            min-height: 100vh;
        }

        /* ── Header ──────────────────────────────────────────────────── */
        .header {
            background: #1e293b;
            color: #fff;
            padding: 14px 20px;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: .4px;
        }

            .header span.sub {
                font-size: 12px;
                font-weight: normal;
                color: #94a3b8;
                margin-left: auto;
            }

        /* ── Container ───────────────────────────────────────────────── */
        .container {
            padding: 15px 18px;
        }

        /* ── Card form ───────────────────────────────────────────────── */
        .card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,.06);
        }

        .card-title {
            font-size: 11px;
            font-weight: bold;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: .6px;
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 2px solid #e2e8f0;
        }

        /* ── Form grid ───────────────────────────────────────────────── */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill,minmax(210px,1fr));
            gap: 10px;
        }

        .field {
            display: flex;
            flex-direction: column;
        }

            .field label {
                font-size: 10.5px;
                font-weight: bold;
                color: #334155;
                margin-bottom: 3px;
                text-transform: uppercase;
                letter-spacing: .3px;
            }

            .field input, .field select {
                padding: 7px 9px;
                border: 1px solid #cbd5e1;
                border-radius: 5px;
                font-size: 12px;
                background: #f8fafc;
                color: #1e293b;
                transition: border-color .15s,box-shadow .15s;
            }

                .field input:focus, .field select:focus {
                    outline: none;
                    border-color: #2563eb;
                    background: #fff;
                    box-shadow: 0 0 0 2px rgba(37,99,235,.15);
                }

        /* ── Botones ─────────────────────────────────────────────────── */
        button {
            padding: 6px 13px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: filter .15s,transform .1s;
            white-space: nowrap;
        }

            button:hover {
                filter: brightness(1.1);
            }

            button:active {
                transform: scale(.97);
            }

        .btn-save {
            background: #16a34a;
            color: #fff;
        }

        .btn-cancel {
            background: #64748b;
            color: #fff;
        }

        .btn-delete {
            background: #dc2626;
            color: #fff;
        }

        .btn-edit {
            background: #f59e0b;
            color: #fff;
        }

        .btn-pdf {
            background: #2563eb;
            color: #fff;
        }

        .btn-export {
            background: #7c3aed;
            color: #fff;
        }

        .btn-back {
            background: #dc2626;
            color: #fff;
            font-style: italic;
        }

        /* ── Barra de botones ────────────────────────────────────────── */
        .btn-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 7px;
            margin-bottom: 10px;
        }

            .btn-bar input[type="number"] {
                padding: 6px 8px;
                border: 1px solid #cbd5e1;
                border-radius: 5px;
                font-size: 12px;
                width: 120px;
                background: #fff;
            }

        /* ── Tabla ───────────────────────────────────────────────────── */
        .table-wrap {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,.06);
            margin-bottom: 10px;
        }

        .table-container {
            width: 100%;
            height: 490px;
            overflow: auto;
        }

        table {
            border-collapse: collapse;
            min-width: 1800px;
            font-size: 11px;
            width: 100%;
        }

        th, td {
            border: 1px solid #e2e8f0;
            padding: 6px 8px;
            white-space: nowrap;
            text-align: center;
        }

        thead th {
            background: #1e293b;
            color: #fff;
            font-size: 10.5px;
            letter-spacing: .3px;
            position: sticky;
            top: 0;
            z-index: 2;
        }

        .filter-row th {
            background: #f1f5f9;
            padding: 4px 5px;
            position: sticky;
            top: 28px;
            z-index: 2;
        }

        .filter-row input {
            width: 100%;
            padding: 4px 6px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            font-size: 11px;
            background: #fff;
        }

            .filter-row input:focus {
                outline: none;
                border-color: #2563eb;
            }

        tbody tr:nth-child(even) {
            background: #f8fafc;
        }

        tbody tr:hover {
            background: #eff6ff;
        }

        /* ── Paginación ──────────────────────────────────────────────── */
        .pagination {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

            .pagination button {
                padding: 5px 12px;
            }

        #paginaInfo {
            font-size: 12px;
            color: #475569;
            font-weight: bold;
        }

        /* ── Badge estado ────────────────────────────────────────────── */
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 99px;
            font-size: 10px;
            font-weight: bold;
            letter-spacing: .3px;
        }

        .badge-si {
            background: #dcfce7;
            color: #15803d;
        }

        .badge-no {
            background: #fee2e2;
            color: #b91c1c;
        }

        .badge-otro {
            background: #f1f5f9;
            color: #475569;
        }

        /* ── Modo edición ────────────────────────────────────────────── */
        .editing-banner {
            display: none;
            background: #fef3c7;
            border: 1px solid #f59e0b;
            border-radius: 6px;
            padding: 7px 12px;
            font-size: 12px;
            color: #92400e;
            font-weight: bold;
            margin-bottom: 10px;
        }

            .editing-banner.visible {
                display: block;
            }
    </style>
</head>

<body>

    <div class="header">
        📋 REQ vs ORDEN DE COMPRA
        <span class="sub">Módulo de Presupuestos</span>
    </div>

    <div class="container">

        <!-- Banner modo edición -->
        <div class="editing-banner" id="editingBanner">
            ✏️ Modo edición — modifica los campos y presiona GUARDAR / ACTUALIZAR
        </div>

        <!-- Formulario -->
        <div class="card">
            <div class="card-title">📝 Registro de Requisición vs Orden de Compra</div>
            <div class="form-grid">

                <div class="field">
                    <label>No. Requisición</label>
                    <input id="NO_REQUISICION" placeholder="Ej: REQ-001">
                </div>

                <div class="field">
                    <label>Orden de Compra</label>
                    <input id="ORDEN_COMPRA" placeholder="Ej: OC-2024-001">
                </div>

                <div class="field">
                    <label>Fecha de Compra</label>
                    <input id="FECHA_COMPRA" type="date">
                </div>

                <div class="field">
                    <label>PO Subtotal</label>
                    <input id="PO_SUBTOTAL" type="number" step="0.01" placeholder="Ej: 1500.00">
                </div>

                <div class="field">
                    <label>Moneda</label>
                    <select id="MONEDA">
                        <option value="">— Selecciona —</option>
                        <option value="MXN">MXN</option>
                        <option value="USD">USD</option>
                        <option value="EUR">EUR</option>
                    </select>
                </div>

                <div class="field">
                    <label>OC Subtotal</label>
                    <input id="OC_SUBTOTAL" placeholder="Ej: 1500.00">
                </div>

                <div class="field">
                    <label>Registrada en OC</label>
                    <select id="REGISTRADA_EN_OC">
                        <option value="">— Selecciona —</option>
                        <option value="SI">SI</option>
                        <option value="NO">NO</option>
                    </select>
                </div>

            </div>

            <div class="btn-bar" style="margin-top:12px;">
                <button class="btn-save" onclick="guardar()">💾 GUARDAR / ACTUALIZAR</button>
                <button class="btn-cancel" onclick="cancelarEdicion()">✖ CANCELAR</button>
            </div>
        </div>

        <!-- Exportaciones -->
        <div class="card">
            <div class="card-title">📤 Exportaciones</div>
            <div class="btn-bar">
                <button class="btn-export" onclick="exportarFiltrado()">⬇ Exportar Filtrado</button>
                <button class="btn-export" onclick="exportarTodo()">⬇ Exportar Todo</button>
                <input type="number" id="anioExportar" placeholder="Año (ej: 2026)">
                <button class="btn-export" onclick="exportarPorAnio()">📅 Exportar por Año</button>
            </div>
        </div>

        <!-- Tabla -->
        <div class="table-wrap">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>No. Requisición</th>
                            <th>Orden Compra</th>
                            <th>Fecha Compra</th>
                            <th>PO Subtotal</th>
                            <th>Moneda</th>
                            <th>OC Subtotal</th>
                            <th>Registrada en OC</th>
                            <th>PDF</th>
                            <th>ACCIONES</th>
                        </tr>
                        <tr class="filter-row">
                            <th></th>
                            <th><input oninput="filtrar()" placeholder="Filtrar..."></th>
                            <th><input oninput="filtrar()" placeholder="Filtrar..."></th>
                            <th><input oninput="filtrar()" placeholder="Filtrar..."></th>
                            <th><input oninput="filtrar()" placeholder="Filtrar..."></th>
                            <th><input oninput="filtrar()" placeholder="Filtrar..."></th>
                            <th><input oninput="filtrar()" placeholder="Filtrar..."></th>
                            <th><input oninput="filtrar()" placeholder="Filtrar..."></th>
                            <th></th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="tabla"></tbody>
                </table>
            </div>
        </div>

        <!-- Paginación -->
        <div class="pagination">
            <button onclick="anterior()">◀ Anterior</button>
            <span id="paginaInfo">—</span>
            <button onclick="siguiente()">Siguiente ▶</button>
            <button class="btn-back" onclick="window.location.href='presupuestos_menu.html'">
                ↩ REGRESAR A PRESUPUESTOS
            </button>
        </div>

    </div><!-- /container -->

    <script>
        let paginaActual = 1;
        const limite = 10;
        let totalRegistros = 0;
        let editandoID = null;
        let datosOriginales = [];
        let datosFiltrados = [];

        // ── Badge Registrada en OC ─────────────────────────────────────────────────
        function badge(val) {
            if (!val) return '<span class="badge badge-otro">—</span>';
            const v = val.toString().toUpperCase();
            if (v === "SI") return `<span class="badge badge-si">SI</span>`;
            if (v === "NO") return `<span class="badge badge-no">NO</span>`;
            return `<span class="badge badge-otro">${val}</span>`;
        }

        // ── Guardar / Actualizar ───────────────────────────────────────────────────
        function guardar() {
            const data = {
                NO_REQUISICION: document.getElementById("NO_REQUISICION").value || null,
                ORDEN_COMPRA: document.getElementById("ORDEN_COMPRA").value || null,
                FECHA_COMPRA: document.getElementById("FECHA_COMPRA").value || null,
                PO_SUBTOTAL: document.getElementById("PO_SUBTOTAL").value || null,
                MONEDA: document.getElementById("MONEDA").value || null,
                OC_SUBTOTAL: document.getElementById("OC_SUBTOTAL").value || null,
                REGISTRADA_EN_OC: document.getElementById("REGISTRADA_EN_OC").value || null
            };

            if (editandoID) {
                fetch(`/PRESUPUESTOS_REQ_VS_OC/${editandoID}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                }).then(() => { editandoID = null; limpiar(); cargar(); });
            } else {
                fetch("/PRESUPUESTOS_REQ_VS_OC", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                }).then(() => { limpiar(); cargar(); });
            }
        }

        function limpiar() {
            ["NO_REQUISICION", "ORDEN_COMPRA", "FECHA_COMPRA",
                "PO_SUBTOTAL", "MONEDA", "OC_SUBTOTAL", "REGISTRADA_EN_OC"]
                .forEach(id => document.getElementById(id).value = "");
            document.getElementById("editingBanner").classList.remove("visible");
        }

        function cancelarEdicion() {
            editandoID = null;
            limpiar();
        }

        // ── Cargar ─────────────────────────────────────────────────────────────────
        function obtenerParametros() {
            const filtros = document.querySelectorAll(".filter-row input");
            return new URLSearchParams({
                page: paginaActual,
                limit: limite,
                NO_REQUISICION: filtros[0].value,
                ORDEN_COMPRA: filtros[1].value,
                FECHA_COMPRA: filtros[2].value,
                PO_SUBTOTAL: filtros[3].value,
                MONEDA: filtros[4].value,
                OC_SUBTOTAL: filtros[5].value,
                REGISTRADA_EN_OC: filtros[6].value
            });
        }

        function cargar() {
            fetch(`/PRESUPUESTOS_REQ_VS_OC?${obtenerParametros().toString()}`)
                .then(r => r.json())
                .then(resp => {
                    totalRegistros = resp.total;
                    datosOriginales = resp.data;
                    datosFiltrados = [...datosOriginales];
                    renderizar();
                });
        }

        // ── Renderizar ─────────────────────────────────────────────────────────────
        function renderizar() {
            const tbody = document.getElementById("tabla");
            tbody.innerHTML = "";

            datosFiltrados.forEach(row => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                <td>${row.ID}</td>
                <td>${row.NO_REQUISICION ?? ""}</td>
                <td>${row.ORDEN_COMPRA ?? ""}</td>
                <td>${row.FECHA_COMPRA ?? ""}</td>
                <td>${row.PO_SUBTOTAL != null
                        ? Number(row.PO_SUBTOTAL).toLocaleString("es-MX", { minimumFractionDigits: 2 })
                        : ""}</td>
                <td>${row.MONEDA ?? ""}</td>
                <td>${row.OC_SUBTOTAL ?? ""}</td>
                <td>${badge(row.REGISTRADA_EN_OC)}</td>
                <td>
                ${row.TIENE_PDF
                        ? `<button class="btn-pdf"    onclick="verPDF(${row.ID})">📄 Ver PDF</button>
                     <button class="btn-delete" onclick="eliminarPDF(${row.ID})">🗑 Quitar</button>`
                        : `<input type="file" accept="application/pdf"
                            onchange="subirPDF(${row.ID},this)">`
                    }
                </td>
                <td>
                <button class="btn-edit"   onclick='editar(${JSON.stringify(row)})'>✏️ Editar</button>
                <button class="btn-delete" onclick="eliminar(${row.ID})">🗑 Eliminar</button>
                </td>`;
                tbody.appendChild(tr);
            });

            const total = Math.max(1, Math.ceil(totalRegistros / limite));
            document.getElementById("paginaInfo").textContent =
                `Página ${paginaActual} de ${total}  (${totalRegistros} registros)`;
        }

        // ── Editar ─────────────────────────────────────────────────────────────────
        function editar(row) {
            editandoID = row.ID;
            const map = {
                NO_REQUISICION: row.NO_REQUISICION,
                ORDEN_COMPRA: row.ORDEN_COMPRA,
                FECHA_COMPRA: row.FECHA_COMPRA,
                PO_SUBTOTAL: row.PO_SUBTOTAL,
                MONEDA: row.MONEDA,
                OC_SUBTOTAL: row.OC_SUBTOTAL,
                REGISTRADA_EN_OC: row.REGISTRADA_EN_OC
            };
            Object.entries(map).forEach(([k, v]) => {
                const el = document.getElementById(k);
                if (el) el.value = v ?? "";
            });
            document.getElementById("editingBanner").classList.add("visible");
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        // ── Eliminar ───────────────────────────────────────────────────────────────
        function eliminar(id) {
            if (!confirm("¿Eliminar este registro?")) return;
            fetch(`/PRESUPUESTOS_REQ_VS_OC/${id}`, { method: "DELETE" }).then(() => cargar());
        }

        // ── PDF ────────────────────────────────────────────────────────────────────
        function subirPDF(id, input) {
            const file = input.files[0];
            if (!file) return;
            const fd = new FormData();
            fd.append("file", file);
            fetch(`/PRESUPUESTOS_REQ_VS_OC/PDF/${id}`, { method: "POST", body: fd })
                .then(() => cargar());
        }

        function verPDF(id) {
            window.open(`/PRESUPUESTOS_REQ_VS_OC/PDF/${id}`, "_blank");
        }

        function eliminarPDF(id) {
            if (!confirm("¿Seguro que deseas eliminar el PDF?")) return;
            fetch(`/PRESUPUESTOS_REQ_VS_OC/PDF/${id}`, { method: "DELETE" }).then(() => cargar());
        }

        // ── Filtrar / Paginación ───────────────────────────────────────────────────
        function filtrar() { paginaActual = 1; cargar(); }
        function siguiente() { if (paginaActual * limite < totalRegistros) { paginaActual++; cargar(); } }
        function anterior() { if (paginaActual > 1) { paginaActual--; cargar(); } }

        // ── Exportar ───────────────────────────────────────────────────────────────
        function exportarFiltrado() {
            const filtros = document.querySelectorAll(".filter-row input");
            const p = new URLSearchParams({
                NO_REQUISICION: filtros[0].value,
                ORDEN_COMPRA: filtros[1].value,
                FECHA_COMPRA: filtros[2].value,
                PO_SUBTOTAL: filtros[3].value,
                MONEDA: filtros[4].value,
                OC_SUBTOTAL: filtros[5].value,
                REGISTRADA_EN_OC: filtros[6].value
            });
            window.open(`/PRESUPUESTOS_REQ_VS_OC/EXPORTAR?${p.toString()}`);
        }

        function exportarTodo() {
            window.open(`/PRESUPUESTOS_REQ_VS_OC/EXPORTAR_TODO`);
        }

        function exportarPorAnio() {
            const anio = document.getElementById("anioExportar").value;
            if (!anio) { alert("Ingresa un año"); return; }
            window.open(`/PRESUPUESTOS_REQ_VS_OC/EXPORTAR_ANIO?anio=${anio}`);
        }

        // ── Init ───────────────────────────────────────────────────────────────────
        cargar();
    </script>
</body>
</html>
