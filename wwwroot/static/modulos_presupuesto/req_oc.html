<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REQ vs ORDEN DE COMPRA</title>

<style>
body{
    font-family:Arial;
    margin:0;
    background:#f1f5f9;
}

.header{
    background:#1e293b;
    color:white;
    padding:15px;
    font-size:20px;
    font-weight:bold;
}

.container{
    padding:15px;
}
.back{
    background:#dc2626;
    font-style: italic; color:#ffffff;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:12px;
    margin-bottom:15px;
}

.field{
    display:flex;
    flex-direction:column;
}

.field label{
    font-size:11px;
    font-weight:bold;
    color:#1e293b;
    margin-bottom:4px;
    text-transform:uppercase;
    letter-spacing:0.3px;
}

.field input{
    padding:7px;
    border:1px solid #cbd5e1;
    border-radius:5px;
    font-size:12px;
    background:#f8fafc;
    transition:border-color 0.2s;
}

.field input:focus{
    outline:none;
    border-color:#2563eb;
    background:white;
    box-shadow:0 0 0 2px rgba(37,99,235,0.15);
}

button{
    padding:6px 12px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:12px;
    font-weight:bold;
    margin-right:5px;
}

.save{background:#16a34a;color:white;}
.cancel{background:#64748b;color:white;}
.delete{background:#dc2626;color:white;}
.edit{background:#f59e0b;color:white;}
.pdf{background:#2563eb;color:white;}
.export{background:#7c3aed;color:white;}

.btn-bar{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    gap:8px;
    margin-bottom:12px;
}

.btn-bar input[type="number"]{
    padding:6px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:12px;
    width:110px;
}

.table-container{
    width:100%;
    height:500px;
    overflow:auto;
    border:1px solid #ccc;
    background:white;
}

table{
    border-collapse:collapse;
    min-width:2000px;
    font-size:11px;
}

th,td{
    border:1px solid #ccc;
    padding:6px;
    white-space:nowrap;
    text-align:center;
}

th{
    background:#1e293b;
    color:white;
    position:sticky;
    top:0;
    z-index:2;
}

.filter-row input{
    width:100%;
    font-size:11px;
}

.pagination{
    margin-top:10px;
}
</style>
</head>

<body>

<div class="header">REQ vs ORDEN DE COMPRA</div>

<div class="container">

<div class="form-grid">

    <div class="field">
        <label>No. Requisición</label>
        <input id="NO_REQUISICION" placeholder="Ej: REQ-001">
    </div>

    <div class="field">
        <label>Orden de Compra</label>
        <input id="ORDEN_COMPRA" placeholder="Ej: OC-2024-001">
    </div>

    <div class="field">
        <label>Fecha de Compra</label>
        <input id="FECHA_COMPRA" type="date">
    </div>

    <div class="field">
        <label>PO Subtotal</label>
        <input id="PO_SUBTOTAL" placeholder="Ej: 1500.00">
    </div>

    <div class="field">
        <label>Moneda</label>
        <input id="MONEDA" placeholder="Ej: MXN / USD">
    </div>

    <div class="field">
        <label>OC Subtotal</label>
        <input id="OC_SUBTOTAL" placeholder="Ej: 1500.00">
    </div>

    <div class="field">
        <label>Registrada en OC</label>
        <input id="REGISTRADA_EN_OC" placeholder="Ej: SI / NO">
    </div>

</div>

<div class="btn-bar">
    <button class="save" onclick="guardar()">GUARDAR / ACTUALIZAR</button>
    <button class="cancel" onclick="cancelarEdicion()">CANCELAR</button>
</div>

<div class="btn-bar">
    <button class="export" onclick="exportarFiltrado()">Exportar Filtrado</button>
    <button class="export" onclick="exportarTodo()">Exportar Todo</button>
    <input type="number" id="anioExportar" placeholder="Año (ej: 2026)">
    <button class="export" onclick="exportarPorAnio()">Exportar por Año</button>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>ID</th>
<th>No. Requisición</th>
<th>Orden Compra</th>
<th>Fecha Compra</th>
<th>PO Subtotal</th>
<th>Moneda</th>
<th>OC Subtotal</th>
<th>Registrada en OC</th>
<th>PDF</th>
<th>ACCIONES</th>
</tr>

<tr class="filter-row">
<th></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th></th>
<th></th>
</tr>
</thead>

<tbody id="tabla"></tbody>
</table>
</div>

<div class="pagination">
<button onclick="anterior()">Anterior</button>
<span id="paginaInfo"></span>
<button onclick="siguiente()">Siguiente</button>
<button class="back" onclick="window.location.href='presupuestos_menu.html'">
REGRESAR A PRESUPUESTOS
</button>
</div>

</div>

<script>

let paginaActual = 1;
let limite = 10;
let totalRegistros = 0;
let editandoID = null;
let datosOriginales = [];
let datosFiltrados = [];

function guardar(){
    let data = {
        NO_REQUISICION:   NO_REQUISICION.value  || null,
        ORDEN_COMPRA:     ORDEN_COMPRA.value     || null,
        FECHA_COMPRA:     FECHA_COMPRA.value     || null,
        PO_SUBTOTAL:      PO_SUBTOTAL.value      || null,
        MONEDA:           MONEDA.value           || null,
        OC_SUBTOTAL:      OC_SUBTOTAL.value      || null,
        REGISTRADA_EN_OC: REGISTRADA_EN_OC.value || null
    };

    if(editandoID){
        fetch(`/PRESUPUESTOS_REQ_VS_OC/${editandoID}`,{
            method:"PUT",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify(data)
        }).then(()=>{ editandoID=null; limpiar(); cargar(); });
    } else {
        fetch("/PRESUPUESTOS_REQ_VS_OC",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify(data)
        }).then(()=>{ limpiar(); cargar(); });
    }
}

function limpiar(){
    document.querySelectorAll(".form-grid input").forEach(i=>i.value="");
}

function cancelarEdicion(){
    editandoID = null;
    limpiar();
}

function obtenerParametros(){
    let filtros = document.querySelectorAll(".filter-row input");
    return new URLSearchParams({
        page:             paginaActual,
        limit:            limite,
        NO_REQUISICION:   filtros[0].value,
        ORDEN_COMPRA:     filtros[1].value,
        FECHA_COMPRA:     filtros[2].value,
        PO_SUBTOTAL:      filtros[3].value,
        MONEDA:           filtros[4].value,
        OC_SUBTOTAL:      filtros[5].value,
        REGISTRADA_EN_OC: filtros[6].value
    });
}

function cargar(){
    let params = obtenerParametros();
    fetch(`/PRESUPUESTOS_REQ_VS_OC?${params.toString()}`)
    .then(res=>res.json())
    .then(resp=>{
        totalRegistros = resp.total;
        datosOriginales = resp.data;
        datosFiltrados = [...datosOriginales];
        renderizar();
    });
}

function renderizar(){
    tabla.innerHTML="";
    datosFiltrados.forEach(row=>{
        tabla.innerHTML+=`
        <tr>
        <td>${row.ID}</td>
        <td>${row.NO_REQUISICION??""}</td>
        <td>${row.ORDEN_COMPRA??""}</td>
        <td>${row.FECHA_COMPRA??""}</td>
        <td>${row.PO_SUBTOTAL??""}</td>
        <td>${row.MONEDA??""}</td>
        <td>${row.OC_SUBTOTAL??""}</td>
        <td>${row.REGISTRADA_EN_OC??""}</td>
        <td>
        ${row.TIENE_PDF
        ? `<button class="pdf" onclick="verPDF(${row.ID})">Ver PDF</button>
           <button class="delete" onclick="eliminarPDF(${row.ID})">Quitar</button>`
        : `<input type="file" onchange="subirPDF(${row.ID},this)">`
        }
        </td>
        <td>
        <button class="edit" onclick='editar(${JSON.stringify(row)})'>Editar</button>
        <button class="delete" onclick="eliminar(${row.ID})">Eliminar</button>
        </td>
        </tr>`;
    });
    paginaInfo.innerText=`Página ${paginaActual} de ${Math.ceil(totalRegistros/limite)}`;
}

function editar(row){
    editandoID = row.ID;
    Object.keys(row).forEach(key=>{
        if(document.getElementById(key)){
            document.getElementById(key).value = row[key] ?? "";
        }
    });
    window.scrollTo({top:0, behavior:"smooth"});
}

function eliminar(id){
    if(!confirm("¿Eliminar este registro?")) return;
    fetch(`/PRESUPUESTOS_REQ_VS_OC/${id}`,{method:"DELETE"}).then(()=>cargar());
}

function subirPDF(id, input){
    let file = input.files[0];
    if(!file) return;
    let formData = new FormData();
    formData.append("file", file);
    fetch(`/PRESUPUESTOS_REQ_VS_OC/PDF/${id}`,{method:"POST", body:formData})
    .then(()=>cargar());
}

function verPDF(id){
    window.open(`/PRESUPUESTOS_REQ_VS_OC/PDF/${id}`,"_blank");
}

function eliminarPDF(id){
    if(!confirm("¿Seguro que deseas eliminar el PDF?")) return;
    fetch(`/PRESUPUESTOS_REQ_VS_OC/PDF/${id}`,{method:"DELETE"})
    .then(()=>cargar());
}

function filtrar(){
    paginaActual = 1;
    cargar();
}

function exportarFiltrado(){
    let filtros = document.querySelectorAll(".filter-row input");
    let params = new URLSearchParams({
        NO_REQUISICION:   filtros[0].value,
        ORDEN_COMPRA:     filtros[1].value,
        FECHA_COMPRA:     filtros[2].value,
        PO_SUBTOTAL:      filtros[3].value,
        MONEDA:           filtros[4].value,
        OC_SUBTOTAL:      filtros[5].value,
        REGISTRADA_EN_OC: filtros[6].value
    });
    window.open(`/PRESUPUESTOS_REQ_VS_OC/EXPORTAR?${params.toString()}`);
}

function exportarTodo(){
    window.open(`/PRESUPUESTOS_REQ_VS_OC/EXPORTAR_TODO`);
}

function exportarPorAnio(){
    let anio = document.getElementById("anioExportar").value;
    if(!anio){ alert("Ingresa un año"); return; }
    window.open(`/PRESUPUESTOS_REQ_VS_OC/EXPORTAR_ANIO?anio=${anio}`);
}

function siguiente(){
    if(paginaActual*limite<totalRegistros){ paginaActual++; cargar(); }
}

function anterior(){
    if(paginaActual>1){ paginaActual--; cargar(); }
}

cargar();

</script>

</body>
</html>
