<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REFACCIONES RED NF</title>
<style>
body{font-family:Arial;margin:0;background:#f1f5f9;}
.header{background:#1e293b;color:white;padding:15px;font-size:20px;font-weight:bold;}
.container{padding:15px;}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:15px;}
.field{display:flex;flex-direction:column;}
.field label{font-size:11px;font-weight:bold;color:#1e293b;margin-bottom:4px;text-transform:uppercase;}
.field input{padding:7px;border:1px solid #cbd5e1;border-radius:5px;font-size:12px;background:#f8fafc;}
.field textarea{padding:7px;border:1px solid #cbd5e1;border-radius:5px;font-size:12px;background:#f8fafc;resize:vertical;min-height:60px;}
.field input:focus,.field textarea:focus{outline:none;border-color:#2563eb;background:white;}
button{padding:6px 12px;border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:bold;margin-right:5px;}
.save{background:#16a34a;color:white;}.cancel{background:#64748b;color:white;}.delete{background:#dc2626;color:white;}
.edit{background:#f59e0b;color:white;}.pdf{background:#2563eb;color:white;}.export{background:#7c3aed;color:white;}
.btn-bar{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:12px;}
.btn-bar input[type="number"]{padding:6px;border:1px solid #ccc;border-radius:5px;font-size:12px;width:110px;}
.table-container{width:100%;height:500px;overflow:auto;border:1px solid #ccc;background:white;}
table{border-collapse:collapse;min-width:3800px;font-size:11px;}
th,td{border:1px solid #ccc;padding:6px;white-space:nowrap;text-align:center;}
th{background:#1e293b;color:white;position:sticky;top:0;z-index:2;}
.filter-row input{width:100%;font-size:11px;}
.pagination{margin-top:10px;}
.back{
    background:#dc2626;
    font-style: italic; color:#ffffff;
}
</style>
</head>
<body>
<div class="header">REFACCIONES RED NF</div>
<div class="container">

<div class="form-grid">
  <div class="field"><label>ID Unico</label><input id="ID_UNICO"></div>
  <div class="field"><label>OC</label><input id="OC"></div>
  <div class="field"><label>Folio / Correctivo</label><input id="FOLIO_CORRECTIVO"></div>
  <div class="field"><label>Fecha Registro</label><input id="FECHA_REGISTRO" type="date"></div>
  <div class="field"><label>Recibido Por</label><input id="RECIBIDO_POR"></div>
  <div class="field"><label>Subcategoria</label><input id="SUBCATEGORIA"></div>
  <div class="field"><label>No. Parte</label><input id="NO_PARTE"></div>
  <div class="field"><label>Marca</label><input id="MARCA"></div>
  <div class="field"><label>Modelo</label><input id="MODELO"></div>
  <div class="field"><label>Numero Serie</label><input id="NUMERO_SERIE"></div>
  <div class="field"><label>MAC 1</label><input id="MAC1"></div>
  <div class="field"><label>MAC 2</label><input id="MAC2"></div>
  <div class="field"><label>MAC Address</label><input id="MAC_ADDRESS"></div>
  <div class="field"><label>Cantidad</label><input id="CANTIDAD"></div>
  <div class="field"><label>Proveedor</label><input id="PROVEEDOR"></div>
  <div class="field"><label>Costo</label><input id="COSTO"></div>
  <div class="field"><label>Moneda</label><input id="MONEDA"></div>
  <div class="field"><label>Ubicacion</label><input id="UBICACION"></div>
  <div class="field"><label>Destino</label><input id="DESTINO"></div>
  <div class="field"><label>Activo DTR3</label><input id="ACTIVO_DTR3"></div>
  <div class="field" style="grid-column:span 2"><label>Observaciones</label><textarea id="OBSERVACIONES"></textarea></div>
</div>

<div class="btn-bar">
  <button class="save" onclick="guardar()">GUARDAR / ACTUALIZAR</button>
  <button class="cancel" onclick="cancelarEdicion()">CANCELAR</button>
</div>
<div class="btn-bar">
  <button class="export" onclick="exportarTodo()">Exportar Todo</button>
  <input type="number" id="anioExportar" placeholder="Año (ej: 2026)">
  <button class="export" onclick="exportarPorAnio()">Exportar por Año</button>
</div>

<div class="table-container">
<table>
<thead>
<tr>
  <th>ID</th><th>ID UNICO</th><th>OC</th><th>FOLIO/CORR</th><th>FECHA REG</th>
  <th>RECIBIDO</th><th>SUBCATEGORIA</th><th>NO PARTE</th><th>MARCA</th><th>MODELO</th>
  <th>NO SERIE</th><th>MAC 1</th><th>MAC 2</th><th>MAC ADDRESS</th>
  <th>CANTIDAD</th><th>PROVEEDOR</th><th>COSTO</th><th>MONEDA</th>
  <th>UBICACION</th><th>DESTINO</th><th>OBSERVACIONES</th><th>ACTIVO DTR3</th>
  <th>PDF</th><th>ACCIONES</th>
</tr>
<tr class="filter-row">
  <th></th>
  <th><input oninput="filtrar()"></th><!-- f[0]  ID_UNICO -->
  <th><input oninput="filtrar()"></th><!-- f[1]  OC -->
  <th><input oninput="filtrar()"></th><!-- f[2]  FOLIO_CORRECTIVO -->
  <th><input oninput="filtrar()"></th><!-- f[3]  FECHA_REGISTRO -->
  <th><input oninput="filtrar()"></th><!-- f[4]  RECIBIDO_POR -->
  <th><input oninput="filtrar()"></th><!-- f[5]  SUBCATEGORIA -->
  <th><input oninput="filtrar()"></th><!-- f[6]  NO_PARTE -->
  <th><input oninput="filtrar()"></th><!-- f[7]  MARCA -->
  <th><input oninput="filtrar()"></th><!-- f[8]  MODELO -->
  <th><input oninput="filtrar()"></th><!-- f[9]  NUMERO_SERIE -->
  <th><input oninput="filtrar()"></th><!-- f[10] MAC1 -->
  <th><input oninput="filtrar()"></th><!-- f[11] MAC2 -->
  <th><input oninput="filtrar()"></th><!-- f[12] MAC_ADDRESS -->
  <th><input oninput="filtrar()"></th><!-- f[13] CANTIDAD -->
  <th><input oninput="filtrar()"></th><!-- f[14] PROVEEDOR -->
  <th><input oninput="filtrar()"></th><!-- f[15] COSTO -->
  <th><input oninput="filtrar()"></th><!-- f[16] MONEDA -->
  <th><input oninput="filtrar()"></th><!-- f[17] UBICACION -->
  <th><input oninput="filtrar()"></th><!-- f[18] DESTINO -->
  <th></th>
  <th><input oninput="filtrar()"></th><!-- f[19] ACTIVO_DTR3 -->
  <th></th><th></th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

<div class="pagination">
  <button onclick="anterior()">Anterior</button>
  <span id="paginaInfo"></span>
  <button onclick="siguiente()">Siguiente</button>
  <button class="back" onclick="window.location.href='presupuestos_menu.html'">
REGRESAR A PRESUPUESTOS
</button>
</div>
</div>

<script>
let paginaActual=1,limite=10,totalRegistros=0,editandoID=null;

function guardar(){
    let ids=['ID_UNICO','OC','FOLIO_CORRECTIVO','FECHA_REGISTRO','RECIBIDO_POR','SUBCATEGORIA',
             'NO_PARTE','MARCA','MODELO','NUMERO_SERIE','MAC1','MAC2','MAC_ADDRESS',
             'CANTIDAD','PROVEEDOR','COSTO','MONEDA','UBICACION','DESTINO',
             'OBSERVACIONES','ACTIVO_DTR3'];
    let data={};
    ids.forEach(k=>{ let el=document.getElementById(k); data[k]=el&&el.value?el.value:null; });
    if(editandoID){
        fetch(`/REFACCIONES_RED_NF/${editandoID}`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)})
        .then(()=>{editandoID=null;limpiarFormulario();cargar();});
    } else {
        fetch("/REFACCIONES_RED_NF",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)})
        .then(()=>{limpiarFormulario();cargar();});
    }
}

function limpiarFormulario(){ document.querySelectorAll(".form-grid input,.form-grid textarea").forEach(i=>i.value=""); }
function cancelarEdicion(){ editandoID=null; limpiarFormulario(); }

function obtenerParametros(){
    let f=document.querySelectorAll(".filter-row input");
    return new URLSearchParams({
        page:paginaActual,limit:limite,
        ID_UNICO:f[0].value,OC:f[1].value,FOLIO_CORRECTIVO:f[2].value,
        FECHA_REGISTRO:f[3].value,RECIBIDO_POR:f[4].value,SUBCATEGORIA:f[5].value,
        NO_PARTE:f[6].value,MARCA:f[7].value,MODELO:f[8].value,
        NUMERO_SERIE:f[9].value,MAC1:f[10].value,MAC2:f[11].value,
        MAC_ADDRESS:f[12].value,CANTIDAD:f[13].value,PROVEEDOR:f[14].value,
        COSTO:f[15].value,MONEDA:f[16].value,UBICACION:f[17].value,
        DESTINO:f[18].value,ACTIVO_DTR3:f[19].value
    });
}

function cargar(){
    fetch(`/REFACCIONES_RED_NF?${obtenerParametros().toString()}`)
    .then(r=>r.json()).then(resp=>{totalRegistros=resp.total;renderizar(resp.data);});
}

function renderizar(datos){
    tabla.innerHTML="";
    datos.forEach(row=>{
        tabla.innerHTML+=`<tr>
        <td>${row.ID}</td><td>${row.ID_UNICO??""}</td><td>${row.OC??""}</td>
        <td>${row.FOLIO_CORRECTIVO??""}</td><td>${row.FECHA_REGISTRO??""}</td>
        <td>${row.RECIBIDO_POR??""}</td><td>${row.SUBCATEGORIA??""}</td>
        <td>${row.NO_PARTE??""}</td><td>${row.MARCA??""}</td><td>${row.MODELO??""}</td>
        <td>${row.NUMERO_SERIE??""}</td><td>${row.MAC1??""}</td><td>${row.MAC2??""}</td>
        <td>${row.MAC_ADDRESS??""}</td><td>${row.CANTIDAD??""}</td>
        <td>${row.PROVEEDOR??""}</td><td>${row.COSTO??""}</td><td>${row.MONEDA??""}</td>
        <td>${row.UBICACION??""}</td><td>${row.DESTINO??""}</td>
        <td>${row.OBSERVACIONES??""}</td><td>${row.ACTIVO_DTR3??""}</td>
        <td>${row.TIENE_PDF
            ?`<button class="pdf" onclick="verPDF(${row.ID})">Ver</button><button class="delete" onclick="eliminarPDF(${row.ID})">Quitar</button>`
            :`<input type="file" onchange="subirPDF(${row.ID},this)">`}</td>
        <td><button class="edit" onclick='editar(${JSON.stringify(row)})'>Editar</button>
        <button class="delete" onclick="eliminar(${row.ID})">Eliminar</button></td>
        </tr>`;
    });
    paginaInfo.innerText=`Pagina ${paginaActual} de ${Math.ceil(totalRegistros/limite)}`;
}

function editar(row){ editandoID=row.ID; Object.keys(row).forEach(k=>{let el=document.getElementById(k);if(el)el.value=row[k]??""}); window.scrollTo({top:0,behavior:"smooth"}); }
function eliminar(id){ if(!confirm("Eliminar?")) return; fetch(`/REFACCIONES_RED_NF/${id}`,{method:"DELETE"}).then(()=>cargar()); }
function subirPDF(id,input){ let fd=new FormData(); fd.append("file",input.files[0]); fetch(`/REFACCIONES_RED_NF/PDF/${id}`,{method:"POST",body:fd}).then(()=>cargar()); }
function verPDF(id){ window.open(`/REFACCIONES_RED_NF/PDF/${id}`,"_blank"); }
function eliminarPDF(id){ if(!confirm("Eliminar PDF?")) return; fetch(`/REFACCIONES_RED_NF/PDF/${id}`,{method:"DELETE"}).then(()=>cargar()); }
function filtrar(){ paginaActual=1; cargar(); }
function exportarTodo(){ window.open(`/REFACCIONES_RED_NF/EXPORTAR_TODO`); }
function exportarPorAnio(){ let a=document.getElementById("anioExportar").value; if(!a){alert("Ingresa un año");return;} window.open(`/REFACCIONES_RED_NF/EXPORTAR_ANIO?anio=${a}`); }
function siguiente(){ if(paginaActual*limite<totalRegistros){paginaActual++;cargar();} }
function anterior(){ if(paginaActual>1){paginaActual--;cargar();} }
cargar();
</script>
</body>
</html>
