<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACCESO AL SISTEMA</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap');

        :root {
            --bg: #0a0c10;
            --panel: #0e1117;
            --border: #1e2a3a;
            --accent: #00d4ff;
            --accent2: #0066ff;
            --text: #c8d8e8;
            --text-dim: #4a6070;
            --error: #ff3355;
            --success: #00ff88;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            position: relative;
        }

            body::before {
                content: '';
                position: fixed;
                inset: 0;
                background-image: linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
                background-size: 40px 40px;
                pointer-events: none;
            }

            body::after {
                content: '';
                position: fixed;
                width: 600px;
                height: 600px;
                border-radius: 50%;
                background: radial-gradient(circle, rgba(0,102,255,0.08) 0%, transparent 70%);
                top: -200px;
                right: -200px;
                animation: pulse 4s ease-in-out infinite;
                pointer-events: none;
            }

        @keyframes pulse {
            0%,100% {
                transform: scale(1);
                opacity: .5
            }

            50% {
                transform: scale(1.2);
                opacity: 1
            }
        }

        .container {
            width: 420px;
            position: relative;
            z-index: 10;
        }

        .brand {
            text-align: center;
            margin-bottom: 32px;
        }

        .brand-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            border: 2px solid var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            clip-path: polygon(8px 0%,100% 0%,100% calc(100% - 8px),calc(100% - 8px) 100%,0% 100%,0% 8px);
        }

            .logo-icon::before {
                content: '';
                position: absolute;
                inset: 3px;
                background: rgba(0,212,255,0.1);
            }

            .logo-icon svg {
                width: 22px;
                height: 22px;
                fill: var(--accent);
                position: relative;
                z-index: 1;
            }

        .brand-name {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 4px;
            color: white;
            text-transform: uppercase;
        }

        .brand-sub {
            font-family: 'Share Tech Mono',monospace;
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 36px;
            position: relative;
            clip-path: polygon(0 0,calc(100% - 16px) 0,100% 16px,100% 100%,16px 100%,0 calc(100% - 16px));
        }

            .panel::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                height: 2px;
                background: linear-gradient(90deg,transparent,var(--accent),var(--accent2),transparent);
            }

        .panel-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: blink 2s ease-in-out infinite;
            box-shadow: 0 0 8px var(--success);
        }

        @keyframes blink {
            0%,100% {
                opacity: 1
            }

            50% {
                opacity: .3
            }
        }

        .panel-title {
            font-family: 'Share Tech Mono',monospace;
            font-size: 12px;
            color: var(--text-dim);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .field {
            margin-bottom: 20px;
        }

            .field label {
                display: block;
                font-family: 'Share Tech Mono',monospace;
                font-size: 11px;
                color: var(--text-dim);
                letter-spacing: 2px;
                text-transform: uppercase;
                margin-bottom: 8px;
            }

        .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

            .input-wrap svg {
                position: absolute;
                left: 12px;
                width: 16px;
                height: 16px;
                fill: var(--text-dim);
                pointer-events: none;
                transition: fill .2s;
            }

        .field input {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'Share Tech Mono',monospace;
            font-size: 14px;
            padding: 12px 12px 12px 40px;
            outline: none;
            transition: all .2s;
            clip-path: polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));
        }

            .field input:focus {
                border-color: var(--accent);
                background: rgba(0,212,255,0.04);
                box-shadow: 0 0 0 1px rgba(0,212,255,0.2),inset 0 0 20px rgba(0,212,255,0.03);
            }

        .input-wrap:focus-within svg {
            fill: var(--accent);
        }

        .field input::placeholder {
            color: var(--text-dim);
            opacity: .5;
        }

        .error-msg {
            display: none;
            align-items: center;
            gap: 8px;
            background: rgba(255,51,85,0.08);
            border: 1px solid rgba(255,51,85,0.3);
            padding: 10px 14px;
            margin-bottom: 20px;
            font-family: 'Share Tech Mono',monospace;
            font-size: 12px;
            color: var(--error);
            letter-spacing: 1px;
        }

            .error-msg.show {
                display: flex;
                animation: shake .3s ease;
            }

        @keyframes shake {
            0%,100% {
                transform: translateX(0)
            }

            25% {
                transform: translateX(-6px)
            }

            75% {
                transform: translateX(6px)
            }
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg,var(--accent2),var(--accent));
            border: none;
            color: #000;
            font-family: 'Rajdhani',sans-serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            padding: 14px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            clip-path: polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));
            transition: all .2s;
        }

            .btn-login::before {
                content: '';
                position: absolute;
                top: 0;
                left: -100%;
                width: 100%;
                height: 100%;
                background: linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);
                transition: left .4s;
            }

            .btn-login:hover::before {
                left: 100%;
            }

            .btn-login:hover {
                filter: brightness(1.15);
                transform: translateY(-1px);
            }

            .btn-login:active {
                transform: translateY(0);
            }

            .btn-login.loading {
                pointer-events: none;
                opacity: .7;
            }

        .panel-footer {
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-info {
            font-family: 'Share Tech Mono',monospace;
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        .corner-deco {
            position: absolute;
            width: 16px;
            height: 16px;
            border-color: var(--accent);
            border-style: solid;
            opacity: .4;
        }

            .corner-deco.tl {
                top: -1px;
                left: -1px;
                border-width: 2px 0 0 2px
            }

            .corner-deco.tr {
                top: -1px;
                right: -1px;
                border-width: 2px 2px 0 0
            }

            .corner-deco.bl {
                bottom: -1px;
                left: -1px;
                border-width: 0 0 2px 2px
            }

            .corner-deco.br {
                bottom: -1px;
                right: -1px;
                border-width: 0 2px 2px 0
            }

        @keyframes scanline {
            0% {
                transform: translateY(-100%)
            }

            100% {
                transform: translateY(100vh)
            }
        }

        .scanline {
            position: fixed;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg,transparent,rgba(0,212,255,0.05),transparent);
            top: 0;
            left: 0;
            animation: scanline 6s linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        /* Modal cambio de contraseña */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 999;
            justify-content: center;
            align-items: center;
        }

            .modal-overlay.show {
                display: flex;
            }

        .modal-box {
            background: var(--panel);
            border: 1px solid var(--accent);
            padding: 32px;
            width: 400px;
            position: relative;
            clip-path: polygon(0 0,calc(100% - 16px) 0,100% 16px,100% 100%,16px 100%,0 calc(100% - 16px));
        }

            .modal-box::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                height: 2px;
                background: linear-gradient(90deg,transparent,var(--accent),transparent);
            }

        .modal-title {
            font-family: 'Share Tech Mono',monospace;
            font-size: 13px;
            color: var(--accent);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .modal-sub {
            font-family: 'Share Tech Mono',monospace;
            font-size: 11px;
            color: var(--text-dim);
            margin-bottom: 24px;
            line-height: 1.7;
        }

        .modal-err {
            font-family: 'Share Tech Mono',monospace;
            font-size: 11px;
            color: var(--error);
            margin-bottom: 12px;
            min-height: 16px;
        }

        .btn-cambiar {
            width: 100%;
            background: linear-gradient(135deg,var(--accent2),var(--accent));
            border: none;
            color: #000;
            font-family: 'Rajdhani',sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            padding: 12px;
            cursor: pointer;
            margin-top: 8px;
            clip-path: polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));
            transition: filter .2s;
        }

            .btn-cambiar:hover {
                filter: brightness(1.15);
            }
    </style>
</head>
<body>

    <div class="scanline"></div>

    <div class="container">
        <div class="brand">
            <div class="brand-logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z" /></svg>
                </div>
                <div class="brand-name">CHI-IT CONTROL CENTER</div>
            </div>
            <div class="brand-sub">Mantenimientos &amp; Control de Presupuesto</div>
        </div>

        <div class="panel">
            <div class="corner-deco tl"></div><div class="corner-deco tr"></div>
            <div class="corner-deco bl"></div><div class="corner-deco br"></div>

            <div class="panel-header">
                <div class="status-dot"></div>
                <div class="panel-title">Autenticación requerida</div>
            </div>

            <div class="field">
                <label>Usuario</label>
                <div class="input-wrap">
                    <input type="text" id="usuario" placeholder="Ingresa tu usuario"
                           autocomplete="off" onkeydown="if(event.key==='Enter') login()">
                    <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v2h20v-2c0-3.3-6.7-5-10-5z" /></svg>
                </div>
            </div>

            <div class="field">
                <label>Contraseña</label>
                <div class="input-wrap">
                    <input type="password" id="password" placeholder="Ingresa tu contraseña"
                           onkeydown="if(event.key==='Enter') login()">
                    <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.8-2.2-5-5-5S7 3.2 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.7 1.4-3.1 3.1-3.1s3.1 1.4 3.1 3.1v2z" /></svg>
                </div>
            </div>

            <div class="error-msg" id="errorMsg">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" /></svg>
                <span id="errorText">Usuario o contraseña incorrectos</span>
            </div>

            <button class="btn-login" id="btnLogin" onclick="login()">Iniciar sesión</button>

            <div class="panel-footer">
                <span class="footer-info">v1.0.0 &bull; 2026</span>
                <span class="footer-info" id="clock"></span>
            </div>
        </div>
    </div>

    <!-- Modal contraseña temporal -->
    <div class="modal-overlay" id="modalCambio">
        <div class="modal-box">
            <div class="modal-title">⚠ Contraseña temporal detectada</div>
            <div class="modal-sub">
                Tu contraseña actual es temporal.<br>
                Establece una nueva contraseña para continuar.
            </div>

            <div class="field">
                <label>Nueva contraseña</label>
                <div class="input-wrap">
                    <input type="password" id="nuevaPass" placeholder="Mínimo 6 caracteres"
                           onkeydown="if(event.key==='Enter') cambiarPassword()">
                    <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.8-2.2-5-5-5S7 3.2 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.7 1.4-3.1 3.1-3.1s3.1 1.4 3.1 3.1v2z" /></svg>
                </div>
            </div>

            <div class="field">
                <label>Confirmar contraseña</label>
                <div class="input-wrap">
                    <input type="password" id="confirmarPass" placeholder="Repite la contraseña"
                           onkeydown="if(event.key==='Enter') cambiarPassword()">
                    <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.8-2.2-5-5-5S7 3.2 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.7 1.4-3.1 3.1-3.1s3.1 1.4 3.1 3.1v2z" /></svg>
                </div>
            </div>

            <div class="modal-err" id="modalErr"></div>
            <button class="btn-cambiar" onclick="cambiarPassword()">Establecer contraseña</button>
        </div>
    </div>

    <script>
        let _usuarioTemp = '';
        let _passwordTemp = '';

        // ═══════════════════════════════
        // LOGIN
        // ═══════════════════════════════
        async function login() {
            const usuario = document.getElementById('usuario').value.trim();
            const password = document.getElementById('password').value.trim();
            const errEl = document.getElementById('errorMsg');
            const btn = document.getElementById('btnLogin');

            errEl.classList.remove('show');

            if (!usuario || !password) {
                document.getElementById('errorText').textContent = 'Completa todos los campos';
                errEl.classList.add('show');
                return;
            }

            btn.classList.add('loading');
            btn.textContent = 'AUTENTICANDO...';

            try {
                const res = await fetch('/LOGIN', {
                    method: 'POST',
                    credentials: "include",
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario, password })
                });
                const data = await res.json();

                if (data.ok) {
                    // La cookie HTTP 'usuario' ya fue seteada por el servidor
                    // Guardamos nombre en sessionStorage solo para mostrarlo en UI
                    sessionStorage.setItem('nombre', data.nombre || data.usuario);

                    if (data.password_temporal) {
                        // Guardar para usarlos en el cambio
                        _usuarioTemp = data.usuario;
                        _passwordTemp = password.trim();
                        btn.classList.remove('loading');
                        btn.textContent = 'Iniciar sesión';
                        document.getElementById('modalCambio').classList.add('show');
                        setTimeout(() => document.getElementById('nuevaPass').focus(), 100);
                    } else {
                        setTimeout(() => { window.location.href = "/menu"; }, 600);
                    }

                } else {
                    btn.classList.remove('loading');
                    btn.textContent = 'Iniciar sesión';
                    document.getElementById('errorText').textContent = data.mensaje || 'Usuario o contraseña incorrectos';
                    errEl.classList.add('show');
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                }

            } catch (e) {
                btn.classList.remove('loading');
                btn.textContent = 'Iniciar sesión';
                document.getElementById('errorText').textContent = 'Error de conexión con el servidor';
                errEl.classList.add('show');
            }
        }

        // ═══════════════════════════════
        // CAMBIAR CONTRASEÑA TEMPORAL
        // ═══════════════════════════════
        async function cambiarPassword() {
            const nueva = document.getElementById('nuevaPass').value.trim();
            const confirmar = document.getElementById('confirmarPass').value;
            const errEl = document.getElementById('modalErr');

            errEl.textContent = '';

            if (!nueva || nueva.length < 6) {
                errEl.textContent = '⚠ La contraseña debe tener al menos 6 caracteres';
                return;
            }
            if (nueva !== confirmar) {
                errEl.textContent = '⚠ Las contraseñas no coinciden';
                return;
            }
            if (nueva === _passwordTemp) {
                errEl.textContent = '⚠ La nueva contraseña no puede ser igual a la temporal';
                return;
            }

            try {
                const res = await fetch('/CAMBIAR_PASSWORD', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        usuario: _usuarioTemp,
                        passwordActual: _passwordTemp,
                        passwordNuevo: nueva
                    })
                });
                const data = await res.json();

                if (data.ok) {
                    // Actualizar nombre en sessionStorage con el que devuelve el servidor
                    if (data.nombre) sessionStorage.setItem('nombre', data.nombre);
                    document.getElementById('modalCambio').classList.remove('show');
                    window.location.href = '/menu';
                } else {
                    errEl.textContent = '⚠ ' + (data.mensaje || 'Error al cambiar contraseña');
                }

            } catch (e) {
                errEl.textContent = '⚠ Error de conexión';
            }
        }

        // ═══════════════════════════════
        // Reloj
        // ═══════════════════════════════
        function updateClock() {
            document.getElementById('clock').textContent =
                new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        document.getElementById('usuario').focus();
    </script>

</body>
</html>
