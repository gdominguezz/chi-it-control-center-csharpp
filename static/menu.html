<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SISTEMA DE GESTION DE RECURSOS</title>

<style>
body{
    font-family:Arial;
    margin:0;
    background:linear-gradient(135deg,#1e293b,#0f172a);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.container h1{
    text-align:center;
    font-size:48px !important;
    font-weight:bold;
    opacity:0;
    animation:fadeIn 2s ease forwards;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
h1{
    margin-bottom:40px;
}

button{
    padding:20px 40px;
    margin:15px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

.preventivo{
    background:#16a34a;
    color:white;
}

.correctivo{
    background:#2563eb;
    color:white;
}

.bajas{
    background:#eb2525;
    color:white;
}

.presupuesto{
    background:#b3a701;
    color:white;
}
.serviciosp{
    background:#eb9525;
    color:white;
}
.directoriop{
    background:#2d0a66;
    color:white;
}
.vales{
    background:#0c7596;
    color:white;
}
.logout{
    background:#475569;
    color:white;
    font-size:14px;
    padding:10px 20px;
    margin:0;
    border-radius:6px;
}

button:hover{
    transform:scale(1.05);
}

.top-bar{
    position:fixed;
    top:0;
    right:0;
    padding:12px 20px;
    display:flex;
    align-items:center;
    gap:12px;
    font-size:13px;
    color:#94a3b8;
}

.top-bar span{
    color:#e2e8f0;
    font-weight:bold;
}
</style>
</head>

<body>

<!-- Barra superior con usuario y cerrar sesión -->
<div class="top-bar">
    Bienvenido, <span id="nombreUsuario"></span>
    <button class="logout" onclick="cerrarSesion()">Cerrar sesión</button>
</div>

<div class="container">
    <!-- API ICON -->
    <div style="display:flex;justify-content:center;margin-bottom:18px;">
      <svg width="96" height="96" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" style="filter:drop-shadow(0 0 18px rgba(0,229,255,0.35));">
        <defs>
          <radialGradient id="bgGrad" cx="50%" cy="45%" r="60%"><stop offset="0%" stop-color="#0D1B2A"/><stop offset="100%" stop-color="#04080F"/></radialGradient>
          <radialGradient id="blob1" cx="40%" cy="40%" r="55%"><stop offset="0%" stop-color="#FF6B6B" stop-opacity="0.9"/><stop offset="60%" stop-color="#FF4458" stop-opacity="0.6"/><stop offset="100%" stop-color="#C2185B" stop-opacity="0"/></radialGradient>
          <radialGradient id="blob2" cx="60%" cy="60%" r="55%"><stop offset="0%" stop-color="#00E5FF" stop-opacity="0.85"/><stop offset="50%" stop-color="#00BCD4" stop-opacity="0.5"/><stop offset="100%" stop-color="#006064" stop-opacity="0"/></radialGradient>
          <radialGradient id="blob3" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#FFD600" stop-opacity="0.7"/><stop offset="60%" stop-color="#FF8F00" stop-opacity="0.4"/><stop offset="100%" stop-color="#E65100" stop-opacity="0"/></radialGradient>
          <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/><stop offset="30%" stop-color="#E0F7FA" stop-opacity="0.9"/><stop offset="70%" stop-color="#00E5FF" stop-opacity="0.4"/><stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/></radialGradient>
          <filter id="bigGlow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="22" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          <filter id="softBloom" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="14" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          <filter id="tinyGlow" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          <filter id="coreGlow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="30" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          <clipPath id="round"><circle cx="256" cy="256" r="248"/></clipPath>
        </defs>
        <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>
        <g clip-path="url(#round)" opacity="0.18">
          <circle cx="80" cy="100" r="1.2" fill="#fff"/><circle cx="140" cy="60" r="0.9" fill="#fff"/><circle cx="200" cy="90" r="1.5" fill="#fff"/>
          <circle cx="320" cy="75" r="1.0" fill="#fff"/><circle cx="390" cy="110" r="1.3" fill="#fff"/><circle cx="430" cy="60" r="0.8" fill="#fff"/>
          <circle cx="460" cy="180" r="1.1" fill="#fff"/><circle cx="70" cy="300" r="1.2" fill="#fff"/><circle cx="50" cy="420" r="0.9" fill="#fff"/>
          <circle cx="440" cy="380" r="1.4" fill="#fff"/><circle cx="480" cy="300" r="0.8" fill="#fff"/><circle cx="160" cy="450" r="1.0" fill="#fff"/>
          <circle cx="350" cy="440" r="1.2" fill="#fff"/>
        </g>
        <g clip-path="url(#round)" filter="url(#bigGlow)">
          <path d="M256,256 C210,180 130,160 110,210 C85,270 130,340 180,320 C220,305 240,290 256,256 Z" fill="url(#blob1)" opacity="0.9"/>
          <path d="M256,256 C310,210 380,200 400,255 C418,305 390,370 340,370 C295,370 265,310 256,256 Z" fill="url(#blob2)" opacity="0.9"/>
          <path d="M256,256 C230,300 210,370 250,405 C285,435 340,420 355,380 C370,340 320,280 256,256 Z" fill="url(#blob3)" opacity="0.85"/>
        </g>
        <g clip-path="url(#round)" filter="url(#softBloom)" opacity="0.55">
          <path d="M256,80 C340,78 420,140 432,220 C445,305 410,395 340,430 C275,463 185,455 130,410 C75,365 68,280 88,210 C108,138 175,82 256,80 Z" fill="none" stroke="#00E5FF" stroke-width="1.5"/>
          <path d="M256,95 C335,92 408,150 420,228 C432,308 396,390 328,424 C266,455 180,448 126,404 C74,360 68,278 88,212 C110,144 178,97 256,95 Z" fill="none" stroke="#FF6B6B" stroke-width="0.8" opacity="0.6"/>
        </g>
        <g filter="url(#tinyGlow)" opacity="0.7">
          <path d="M256,230 C270,200 310,175 355,160 C390,148 420,155 435,148" stroke="#00E5FF" stroke-width="1.2" fill="none" stroke-linecap="round"/>
          <path d="M245,275 C220,295 185,310 155,340 C130,365 118,390 108,405" stroke="#FF6B6B" stroke-width="1.2" fill="none" stroke-linecap="round"/>
          <path d="M268,278 C295,305 330,330 355,368 C372,393 376,418 380,430" stroke="#FFD600" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        </g>
        <g filter="url(#tinyGlow)">
          <circle cx="370" cy="148" r="7" fill="#00E5FF" opacity="0.95"/><circle cx="370" cy="148" r="12" fill="none" stroke="#00E5FF" stroke-width="1" opacity="0.35"/>
          <circle cx="118" cy="248" r="6" fill="#FF6B6B" opacity="0.95"/><circle cx="118" cy="248" r="11" fill="none" stroke="#FF6B6B" stroke-width="1" opacity="0.35"/>
          <circle cx="356" cy="405" r="6" fill="#FFD600" opacity="0.9"/><circle cx="356" cy="405" r="10" fill="none" stroke="#FFD600" stroke-width="1" opacity="0.3"/>
          <circle cx="248" cy="100" r="4" fill="#FFFFFF" opacity="0.7"/>
          <circle cx="418" cy="300" r="4" fill="#00E5FF" opacity="0.6"/>
          <circle cx="148" cy="390" r="4" fill="#FF6B6B" opacity="0.6"/>
        </g>
        <g filter="url(#coreGlow)">
          <circle cx="256" cy="256" r="52" fill="none" stroke="#00E5FF" stroke-width="0.8" opacity="0.3"/>
          <circle cx="256" cy="256" r="40" fill="none" stroke="#FFFFFF" stroke-width="0.8" opacity="0.2"/>
          <circle cx="256" cy="256" r="28" fill="url(#coreGrad)"/>
          <circle cx="256" cy="256" r="10" fill="#FFFFFF" opacity="1"/>
          <circle cx="256" cy="256" r="5" fill="#FFFFFF" opacity="1"/>
        </g>
        <circle cx="256" cy="256" r="248" fill="none" stroke="#0D1B2A" stroke-width="8"/>
        <circle cx="256" cy="256" r="244" fill="none" stroke="#1a3050" stroke-width="1.5" opacity="0.6"/>
      </svg>
    </div>
    <h1>CHI-IT CONTROL CENTER</h1>



<div style="display:flex; justify-content:center; margin-top:20px;">
    
    <button class="preventivo"
        onclick="window.location.href='/static/preventivos.html'">
        MANTENIMIENTOS PREVENTIVOS
    </button>

</div>

</div>

<script>
const rol = sessionStorage.getItem("rol")
// Verificar sesión — si no hay usuario redirige al login
if (!sessionStorage.getItem('usuario')) {
    window.location.href = '/static/login.html';
}

// Mostrar nombre del usuario
document.getElementById('nombreUsuario').textContent = sessionStorage.getItem('nombre') || sessionStorage.getItem('usuario');

// Cerrar sesión
function cerrarSesion() {
    sessionStorage.clear();
    window.location.href = '/static/login.html';
}
</script>

</body>
</html>
