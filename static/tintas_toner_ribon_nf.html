<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TINTAS TONER RIBON NF</title>
<style>
body{ font-family:Arial; margin:0; background:#f1f5f9; }
.header{ background:#1e293b; color:white; padding:15px; font-size:20px; font-weight:bold; }
.container{ padding:15px; }
.form-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px; margin-bottom:15px; }
.field{ display:flex; flex-direction:column; }
.field label{ font-size:11px; font-weight:bold; color:#1e293b; margin-bottom:4px; text-transform:uppercase; letter-spacing:0.3px; }
.field input{ padding:7px; border:1px solid #cbd5e1; border-radius:5px; font-size:12px; background:#f8fafc; transition:border-color 0.2s; }
.field input:focus{ outline:none; border-color:#2563eb; background:white; box-shadow:0 0 0 2px rgba(37,99,235,0.15); }
button{ padding:6px 12px; border:none; border-radius:5px; cursor:pointer; font-size:12px; font-weight:bold; margin-right:5px; }
.save{background:#16a34a;color:white;} .cancel{background:#64748b;color:white;} .delete{background:#dc2626;color:white;}
.edit{background:#f59e0b;color:white;} .pdf{background:#2563eb;color:white;} .export{background:#7c3aed;color:white;}
.btn-bar{ display:flex; flex-wrap:wrap; align-items:center; gap:8px; margin-bottom:12px; }
.btn-bar input[type="number"]{ padding:6px; border:1px solid #ccc; border-radius:5px; font-size:12px; width:110px; }
.table-container{ width:100%; height:500px; overflow:auto; border:1px solid #ccc; background:white; }
table{ border-collapse:collapse; min-width:2800px; font-size:11px; }
th,td{ border:1px solid #ccc; padding:6px; white-space:nowrap; text-align:center; }
th{ background:#1e293b; color:white; position:sticky; top:0; z-index:2; }
.filter-row input{ width:100%; font-size:11px; }
.pagination{ margin-top:10px; }
.back{
    background:#dc2626;
    font-style: italic; color:#ffffff;
}
</style>
</head>
<body>
<div class="header">TINTAS TONER RIBON NF</div>
<div class="container">
<div class="form-grid">
<div class="field"><label>ID Unico</label><input id="ID_UNICO"></div>
<div class="field"><label>OC</label><input id="OC"></div>
<div class="field"><label>Modelo</label><input id="MODELO"></div>
<div class="field"><label>Recibido Por</label><input id="RECIBIDO_POR"></div>
<div class="field"><label>Subcategoria</label><input id="SUBCATEGORIA"></div>
<div class="field"><label>Fecha Registro</label><input id="FECHA_REGISTRO" type="date"></div>
<div class="field"><label>Proveedor</label><input id="PROVEEDOR"></div>
<div class="field"><label>Stock</label><input id="STOCK"></div>
<div class="field"><label>Costo MN</label><input id="COSTO_MN"></div>
<div class="field"><label>Cantidad Recibida</label><input id="CANTIDAD_RECIBIDA"></div>
<div class="field"><label>Fecha Instalacion</label><input id="FECHA_INSTALACION" type="date"></div>
<div class="field"><label>Ubicacion</label><input id="UBICACION"></div>
<div class="field"><label>Impresora</label><input id="IMPRESORA"></div>
<div class="field"><label>Instalado Por</label><input id="INSTALADO_POR"></div>
</div>

<div class="btn-bar">
    <button class="save" onclick="guardar()">GUARDAR / ACTUALIZAR</button>
    <button class="cancel" onclick="cancelarEdicion()">CANCELAR</button>
</div>
<div class="btn-bar">
    <button class="export" onclick="exportarFiltrado()">Exportar Filtrado</button>
    <button class="export" onclick="exportarTodo()">Exportar Todo</button>
    <input type="number" id="anioExportar" placeholder="Año (ej: 2026)">
    <button class="export" onclick="exportarPorAnio()">Exportar por Año</button>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>ID</th><th>ID UNICO</th><th>OC</th><th>MODELO</th><th>RECIBIDO POR</th>
<th>SUBCATEGORIA</th><th>FECHA REG</th><th>PROVEEDOR</th><th>STOCK</th>
<th>COSTO MN</th><th>CANT RECIBIDA</th><th>FECHA INST</th>
<th>UBICACION</th><th>IMPRESORA</th><th>INSTALADO POR</th>
<th>PDF</th><th>ACCIONES</th>
</tr>
<tr class="filter-row">
<th></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th></th><th></th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>
<div class="pagination">
<button onclick="anterior()">Anterior</button>
<span id="paginaInfo"></span>
<button onclick="siguiente()">Siguiente</button>
<button class="back" onclick="window.location.href='presupuestos_menu.html'">
REGRESAR A PRESUPUESTOS
</button>
</div>
</div>

<script>
let paginaActual=1, limite=10, totalRegistros=0, editandoID=null;

function guardar(){
    let data={
        ID_UNICO: ID_UNICO.value||null, OC: OC.value||null,
        MODELO: MODELO.value||null, RECIBIDO_POR: RECIBIDO_POR.value||null,
        SUBCATEGORIA: SUBCATEGORIA.value||null, FECHA_REGISTRO: FECHA_REGISTRO.value||null,
        PROVEEDOR: PROVEEDOR.value||null, STOCK: STOCK.value||null,
        COSTO_MN: COSTO_MN.value||null, CANTIDAD_RECIBIDA: CANTIDAD_RECIBIDA.value||null,
        FECHA_INSTALACION: FECHA_INSTALACION.value||null, UBICACION: UBICACION.value||null,
        IMPRESORA: IMPRESORA.value||null, INSTALADO_POR: INSTALADO_POR.value||null
    };
    if(editandoID){
        fetch(`/TINTAS_TONER_RIBON_NF/${editandoID}`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)})
        .then(()=>{ editandoID=null; limpiarFormulario(); cargar(); });
    } else {
        fetch("/TINTAS_TONER_RIBON_NF",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)})
        .then(()=>{ limpiarFormulario(); cargar(); });
    }
}

function limpiarFormulario(){ document.querySelectorAll(".form-grid input").forEach(i=>i.value=""); }
function cancelarEdicion(){ editandoID=null; limpiarFormulario(); }

function obtenerParametros(){
    let f=document.querySelectorAll(".filter-row input");
    return new URLSearchParams({
        page:paginaActual, limit:limite,
        ID_UNICO:f[0].value, OC:f[1].value, MODELO:f[2].value,
        RECIBIDO_POR:f[3].value, SUBCATEGORIA:f[4].value, FECHA_REGISTRO:f[5].value,
        PROVEEDOR:f[6].value, STOCK:f[7].value, COSTO_MN:f[8].value,
        CANTIDAD_RECIBIDA:f[9].value, FECHA_INSTALACION:f[10].value,
        UBICACION:f[11].value, IMPRESORA:f[12].value, INSTALADO_POR:f[13].value
    });
}

function cargar(){
    fetch(`/TINTAS_TONER_RIBON_NF?${obtenerParametros().toString()}`)
    .then(r=>r.json()).then(resp=>{ totalRegistros=resp.total; renderizar(resp.data); });
}

function renderizar(datos){
    tabla.innerHTML="";
    datos.forEach(row=>{
        tabla.innerHTML+=`<tr>
        <td>${row.ID}</td><td>${row.ID_UNICO??""}</td><td>${row.OC??""}</td>
        <td>${row.MODELO??""}</td><td>${row.RECIBIDO_POR??""}</td>
        <td>${row.SUBCATEGORIA??""}</td><td>${row.FECHA_REGISTRO??""}</td>
        <td>${row.PROVEEDOR??""}</td><td>${row.STOCK??""}</td>
        <td>${row.COSTO_MN??""}</td><td>${row.CANTIDAD_RECIBIDA??""}</td>
        <td>${row.FECHA_INSTALACION??""}</td><td>${row.UBICACION??""}</td>
        <td>${row.IMPRESORA??""}</td><td>${row.INSTALADO_POR??""}</td>
        <td>${row.TIENE_PDF
            ? `<button class="pdf" onclick="verPDF(${row.ID})">Ver PDF</button><button class="delete" onclick="eliminarPDF(${row.ID})">Quitar</button>`
            : `<input type="file" onchange="subirPDF(${row.ID},this)">`}</td>
        <td><button class="edit" onclick='editar(${JSON.stringify(row)})'>Editar</button>
        <button class="delete" onclick="eliminar(${row.ID})">Eliminar</button></td>
        </tr>`;
    });
    paginaInfo.innerText=`Pagina ${paginaActual} de ${Math.ceil(totalRegistros/limite)}`;
}

function editar(row){
    editandoID=row.ID;
    Object.keys(row).forEach(key=>{ let el=document.getElementById(key); if(el) el.value=row[key]??""; });
    window.scrollTo({top:0,behavior:"smooth"});
}
function eliminar(id){ if(!confirm("Eliminar este registro?")) return; fetch(`/TINTAS_TONER_RIBON_NF/${id}`,{method:"DELETE"}).then(()=>cargar()); }
function subirPDF(id,input){ let file=input.files[0]; if(!file) return; let fd=new FormData(); fd.append("file",file); fetch(`/TINTAS_TONER_RIBON_NF/PDF/${id}`,{method:"POST",body:fd}).then(()=>cargar()); }
function verPDF(id){ window.open(`/TINTAS_TONER_RIBON_NF/PDF/${id}`,"_blank"); }
function eliminarPDF(id){ if(!confirm("Eliminar el PDF?")) return; fetch(`/TINTAS_TONER_RIBON_NF/PDF/${id}`,{method:"DELETE"}).then(()=>cargar()); }
function filtrar(){ paginaActual=1; cargar(); }
function exportarFiltrado(){ window.open(`/TINTAS_TONER_RIBON_NF/EXPORTAR?${obtenerParametros().toString()}`); }
function exportarTodo(){ window.open(`/TINTAS_TONER_RIBON_NF/EXPORTAR_TODO`); }
function exportarPorAnio(){ let a=document.getElementById("anioExportar").value; if(!a){alert("Ingresa un año");return;} window.open(`/TINTAS_TONER_RIBON_NF/EXPORTAR_ANIO?anio=${a}`); }
function siguiente(){ if(paginaActual*limite<totalRegistros){ paginaActual++; cargar(); } }
function anterior(){ if(paginaActual>1){ paginaActual--; cargar(); } }

cargar();
</script>
</body>
</html>
