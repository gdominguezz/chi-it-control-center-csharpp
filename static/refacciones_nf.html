<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REFACCIONES NF</title>

<style>
body{
    font-family:Arial;
    margin:0;
    background:#f1f5f9;
}

.header{
    background:#1e293b;
    color:white;
    padding:15px;
    font-size:20px;
    font-weight:bold;
}

.container{
    padding:15px;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:12px;
    margin-bottom:15px;
}

.field{
    display:flex;
    flex-direction:column;
}

.field label{
    font-size:11px;
    font-weight:bold;
    color:#1e293b;
    margin-bottom:4px;
    text-transform:uppercase;
    letter-spacing:0.3px;
}

.field input{
    padding:7px;
    border:1px solid #cbd5e1;
    border-radius:5px;
    font-size:12px;
    background:#f8fafc;
    transition:border-color 0.2s;
}
.back{
    background:#dc2626;
    font-style: italic; color:#ffffff;
}

.field input:focus{
    outline:none;
    border-color:#2563eb;
    background:white;
    box-shadow:0 0 0 2px rgba(37,99,235,0.15);
}

button{
    padding:6px 12px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:12px;
    font-weight:bold;
    margin-right:5px;
}

.save{background:#16a34a;color:white;}
.cancel{background:#64748b;color:white;}
.delete{background:#dc2626;color:white;}
.edit{background:#f59e0b;color:white;}
.pdf{background:#2563eb;color:white;}
.export{background:#7c3aed;color:white;}

.btn-bar{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    gap:8px;
    margin-bottom:12px;
}

.btn-bar input[type="number"]{
    padding:6px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:12px;
    width:110px;
}

.table-container{
    width:100%;
    height:500px;
    overflow:auto;
    border:1px solid #ccc;
    background:white;
}

table{
    border-collapse:collapse;
    min-width:2800px;
    font-size:11px;
}

th,td{
    border:1px solid #ccc;
    padding:6px;
    white-space:nowrap;
    text-align:center;
}

th{
    background:#1e293b;
    color:white;
    position:sticky;
    top:0;
    z-index:2;
}

.filter-row input{
    width:100%;
    font-size:11px;
}

.pagination{
    margin-top:10px;
}
</style>
</head>

<body>

<div class="header">REFACCIONES NF</div>

<div class="container">

<div class="form-grid">

<div class="field">
    <label>OC</label>
    <input id="OC">
</div>

<div class="field">
    <label>Folio / Correctivo</label>
    <input id="FOLIO_CORRECTIVO">
</div>

<div class="field">
    <label>Fecha Registro</label>
    <input id="FECHA_REGISTRO" type="date">
</div>

<div class="field">
    <label>Recibido Por</label>
    <input id="RECIBIDO_POR">
</div>

<div class="field">
    <label>Subcategoría</label>
    <input id="SUBCATEGORIA">
</div>

<div class="field">
    <label>Marca</label>
    <input id="MARCA">
</div>

<div class="field">
    <label>Modelo</label>
    <input id="MODELO">
</div>

<div class="field">
    <label>Serie</label>
    <input id="SERIE">
</div>

<div class="field">
    <label>Cantidad</label>
    <input id="CANTIDAD">
</div>

<div class="field">
    <label>Núm. Parte</label>
    <input id="NUM_PARTE">
</div>

<div class="field">
    <label>Costo</label>
    <input id="COSTO">
</div>

<div class="field">
    <label>Moneda</label>
    <input id="MONEDA">
</div>

<div class="field">
    <label>Proveedor</label>
    <input id="PROVEEDOR">
</div>

<div class="field">
    <label>Disponible</label>
    <input id="DISPONIBLE">
</div>

<div class="field">
    <label>Comentarios</label>
    <input id="COMENTARIOS">
</div>

</div>

<div class="btn-bar">
    <button class="save" onclick="guardar()">GUARDAR / ACTUALIZAR</button>
    <button class="cancel" onclick="cancelarEdicion()">CANCELAR</button>
</div>

<div class="btn-bar">
    <button class="export" onclick="exportarFiltrado()">Exportar Filtrado</button>
    <button class="export" onclick="exportarTodo()">Exportar Todo</button>
    <input type="number" id="anioExportar" placeholder="Año (ej: 2026)">
    <button class="export" onclick="exportarPorAnio()">Exportar por Año</button>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>ID</th>
<th>OC</th>
<th>FOLIO</th>
<th>FECHA</th>
<th>RECIBIDO</th>
<th>SUBCATEGORIA</th>
<th>MARCA</th>
<th>MODELO</th>
<th>SERIE</th>
<th>CANTIDAD</th>
<th>NUM PARTE</th>
<th>COSTO</th>
<th>MONEDA</th>
<th>PROVEEDOR</th>
<th>DISPONIBLE</th>
<th>COMENTARIOS</th>
<th>PDF</th>
<th>ACCIONES</th>
</tr>

<tr class="filter-row">
<th></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th><input oninput="filtrar()"></th>
<th></th>
<th></th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

<div class="pagination">
<button onclick="anterior()">Anterior</button>
<span id="paginaInfo"></span>
<button onclick="siguiente()">Siguiente</button>
<button class="back" onclick="window.location.href='presupuestos_menu.html'">
REGRESAR A PRESUPUESTOS
</button>
</div>

</div>

<script>

let paginaActual = 1;
let limite = 10;
let totalRegistros = 0;
let editandoID = null;
let datosOriginales = [];
let datosFiltrados = [];

function guardar(){
    let data = {
        OC:               OC.value               || null,
        FOLIO_CORRECTIVO: FOLIO_CORRECTIVO.value || null,
        FECHA_REGISTRO:   FECHA_REGISTRO.value   || null,
        RECIBIDO_POR:     RECIBIDO_POR.value      || null,
        SUBCATEGORIA:     SUBCATEGORIA.value      || null,
        MARCA:            MARCA.value             || null,
        MODELO:           MODELO.value            || null,
        SERIE:            SERIE.value             || null,
        CANTIDAD:         CANTIDAD.value          || null,
        NUM_PARTE:        NUM_PARTE.value         || null,
        COSTO:            COSTO.value             || null,
        MONEDA:           MONEDA.value            || null,
        PROVEEDOR:        PROVEEDOR.value         || null,
        DISPONIBLE:       DISPONIBLE.value        || null,
        COMENTARIOS:      COMENTARIOS.value       || null
    };

    if(editandoID){
        fetch(`/REFACCIONES_NF/${editandoID}`,{
            method:"PUT",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify(data)
        }).then(()=>{ editandoID=null; limpiarFormulario(); cargar(); });
    } else {
        fetch("/REFACCIONES_NF",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify(data)
        }).then(()=>{ limpiarFormulario(); cargar(); });
    }
}

function limpiarFormulario(){
    document.querySelectorAll(".form-grid input").forEach(i=>i.value="");
}

function cancelarEdicion(){
    editandoID = null;
    limpiarFormulario();
}

function obtenerParametros(){
    let f = document.querySelectorAll(".filter-row input");
    return new URLSearchParams({
        page:             paginaActual,
        limit:            limite,
        OC:               f[0].value,
        FOLIO_CORRECTIVO: f[1].value,
        FECHA_REGISTRO:   f[2].value,
        RECIBIDO_POR:     f[3].value,
        SUBCATEGORIA:     f[4].value,
        MARCA:            f[5].value,
        MODELO:           f[6].value,
        SERIE:            f[7].value,
        CANTIDAD:         f[8].value,
        NUM_PARTE:        f[9].value,
        COSTO:            f[10].value,
        MONEDA:           f[11].value,
        PROVEEDOR:        f[12].value,
        DISPONIBLE:       f[13].value,
        COMENTARIOS:      f[14].value
    });
}

function cargar(){
    let params = obtenerParametros();
    fetch(`/REFACCIONES_NF?${params.toString()}`)
    .then(res=>res.json())
    .then(resp=>{
        totalRegistros = resp.total;
        datosOriginales = resp.data;
        datosFiltrados = [...datosOriginales];
        renderizar();
    });
}

function renderizar(){
    tabla.innerHTML="";
    datosFiltrados.forEach(row=>{
        tabla.innerHTML+=`
        <tr>
        <td>${row.ID}</td>
        <td>${row.OC??""}</td>
        <td>${row.FOLIO_CORRECTIVO??""}</td>
        <td>${row.FECHA_REGISTRO??""}</td>
        <td>${row.RECIBIDO_POR??""}</td>
        <td>${row.SUBCATEGORIA??""}</td>
        <td>${row.MARCA??""}</td>
        <td>${row.MODELO??""}</td>
        <td>${row.SERIE??""}</td>
        <td>${row.CANTIDAD??""}</td>
        <td>${row.NUM_PARTE??""}</td>
        <td>${row.COSTO??""}</td>
        <td>${row.MONEDA??""}</td>
        <td>${row.PROVEEDOR??""}</td>
        <td>${row.DISPONIBLE??""}</td>
        <td>${row.COMENTARIOS??""}</td>
        <td>
        ${row.TIENE_PDF
        ? `<button class="pdf" onclick="verPDF(${row.ID})">Ver PDF</button>
           <button class="delete" onclick="eliminarPDF(${row.ID})">Quitar</button>`
        : `<input type="file" onchange="subirPDF(${row.ID},this)">`
        }
        </td>
        <td>
        <button class="edit" onclick='editar(${JSON.stringify(row)})'>Editar</button>
        <button class="delete" onclick="eliminar(${row.ID})">Eliminar</button>
        </td>
        </tr>`;
    });
    paginaInfo.innerText=`Página ${paginaActual} de ${Math.ceil(totalRegistros/limite)}`;
}

function editar(row){
    editandoID = row.ID;
    Object.keys(row).forEach(key=>{
        if(document.getElementById(key)){
            document.getElementById(key).value = row[key] ?? "";
        }
    });
    window.scrollTo({top:0, behavior:"smooth"});
}

function eliminar(id){
    if(!confirm("¿Eliminar este registro?")) return;
    fetch(`/REFACCIONES_NF/${id}`,{method:"DELETE"}).then(()=>cargar());
}

function subirPDF(id, input){
    let file = input.files[0];
    if(!file) return;
    let formData = new FormData();
    formData.append("file", file);
    fetch(`/REFACCIONES_NF/PDF/${id}`,{method:"POST", body:formData})
    .then(()=>cargar());
}

function verPDF(id){
    window.open(`/REFACCIONES_NF/PDF/${id}`,"_blank");
}

function eliminarPDF(id){
    if(!confirm("¿Seguro que deseas eliminar el PDF?")) return;
    fetch(`/REFACCIONES_NF/PDF/${id}`,{method:"DELETE"})
    .then(()=>cargar());
}

function filtrar(){
    paginaActual = 1;
    cargar();
}

function exportarFiltrado(){
    let params = obtenerParametros();
    window.open(`/REFACCIONES_NF/EXPORTAR?${params.toString()}`);
}

function exportarTodo(){
    window.open(`/REFACCIONES_NF/EXPORTAR_TODO`);
}

function exportarPorAnio(){
    let anio = document.getElementById("anioExportar").value;
    if(!anio){ alert("Ingresa un año"); return; }
    window.open(`/REFACCIONES_NF/EXPORTAR_ANIO?anio=${anio}`);
}

function siguiente(){
    if(paginaActual*limite<totalRegistros){ paginaActual++; cargar(); }
}

function anterior(){
    if(paginaActual>1){ paginaActual--; cargar(); }
}

cargar();

</script>

</body>
</html>
