<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MANTENIMIENTOS CORRECTIVOS</title>

<style>
body{font-family:Arial;margin:0;background:#f1f5f9;}
.header{background:#1e293b;color:white;padding:15px;font-size:20px;}
.container{padding:15px;}

.form-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:10px;
margin-bottom:15px;
}

.form-grid div{
display:flex;
flex-direction:column;
}
.back{
    background:#dc2626;
    font-style: italic; color:#ffffff;
}

label{
font-size:11px;
font-weight:bold;
margin-bottom:3px;
color:#334155;
}

input{
padding:6px;
border:1px solid #ccc;
border-radius:5px;
font-size:12px;
height:30px;
}

button{
padding:6px 10px;
border:none;
border-radius:5px;
cursor:pointer;
font-size:12px;
margin-right:5px;
}

.save{background:#16a34a;color:white;}
.cancel{background:#64748b;color:white;}
.delete{background:#dc2626;color:white;}
.edit{background:#ffa600;color:white;}
.ver{background:#00ccff;color:white;}
.pdf{background:#2563eb;color:white;}
.export{background:#7c3aed;color:white;}

.table-container{
width:100%;
height:500px;
overflow:auto;
border:1px solid #ccc;
background:white;
}

table{
border-collapse:collapse;
min-width:2000px;
font-size:11px;
}

th,td{
border:1px solid #ccc;
padding:6px;
white-space:nowrap;
text-align:center;
}

th{
background:#1e293b;
color:white;
position:sticky;
top:0;
}

.filter-row input{
width:100%;
font-size:10px;
height:25px;
}

/* Colores por STATUS */
tr.status-0 td { background:#fef9c3; }
tr.status-1 td { background:#dcfce7; }
tr.status-cancelado td { background:#e2e8f0; color:#94a3b8; }

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
z-index:999;
}

.modal-content{
background:white;
width:90%;
max-height:90%;
overflow:auto;
padding:20px;
border-radius:8px;
}

.modal-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:10px;
}
</style>
</head>

<body>

<div class="header">MANTENIMIENTOS CORRECTIVOS</div>
<div class="container">

<!-- FORMULARIO COMPLETO -->
<div class="form-grid" id="formulario"></div>

<button class="save" onclick="guardar()">GUARDAR</button>
<button class="cancel" onclick="cancelarEdicion()">CANCELAR</button>

<button class="export" onclick="abrirFiltroAvanzado()">Filtro Avanzado</button>
<button class="export" onclick="exportarFiltrado()">Exportar Filtrado</button>
<button class="export" onclick="exportarTodo()">Exportar Todo</button>
<input id="anioExportar" type="number" placeholder="Año">
<button class="export" onclick="exportarAnio()">Exportar por Año</button>

<br><br>

<div class="table-container">
<table>
<thead>
<tr id="encabezadoTabla"></tr>
<tr class="filter-row" id="filaFiltros"></tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

<br>
<button onclick="anterior()">Anterior</button>
<span id="paginaInfo"></span>
<button onclick="siguiente()">Siguiente</button>
<button class="back" onclick="window.location.href='menu.html'">
REGRESAR AL MENU PRINCIPAL
</button>
</div>

<!-- MODAL DETALLE -->
<div id="modalDetalle" class="modal">
<div class="modal-content">
<h2>Detalle Correctivo</h2>
<div id="contenidoDetalle" class="modal-grid"></div>
<br>
<button class="delete" onclick="cerrarModal()">Cerrar</button>
</div>
</div>

<!-- MODAL FILTRO AVANZADO -->
<div id="modalFiltro" class="modal">
<div class="modal-content">
<h2>Filtro Avanzado</h2>
<div id="contenidoFiltro" class="modal-grid"></div>
<br>
<button class="save" onclick="aplicarFiltroAvanzado()">Aplicar</button>
<button class="delete" onclick="cerrarFiltroAvanzado()">Cerrar</button>
</div>
</div>

<script>

let paginaActual=1;
let limite=10;
let totalPaginas=1;
let editandoID=null;
let columnas=[];
let filtrosAvanzados={};

function cargar(){

fetch(`/CORRECTIVOS?page=${paginaActual}&limit=${limite}`)
.then(res=>res.json())
.then(data=>{

if(columnas.length===0 && data.data.length>0){
columnas=Object.keys(data.data[0]).filter(c=>c!=="TIENE_PDF");
generarFormulario();
generarTabla();
}

totalPaginas=Math.ceil(data.total/limite);
renderizar(data.data);

});
}

function generarFormulario(){
let cont=document.getElementById("formulario");
columnas.forEach(col=>{
cont.innerHTML+=`
<div>
<label>${col}</label>
<input id="${col}">
</div>`;
});
}

function generarTabla(){

let head=document.getElementById("encabezadoTabla");
let filtros=document.getElementById("filaFiltros");

columnas.forEach(col=>{
head.innerHTML+=`<th>${col}</th>`;
filtros.innerHTML+=`<th><input oninput="aplicarFiltros()" id="f_${col}"></th>`;
});

head.innerHTML+=`<th>PDF</th><th>ACCIONES</th>`;
filtros.innerHTML+=`<th></th><th></th>`;
}

function aplicarFiltros(){
paginaActual=1;
cargarFiltrado();
}

function cargarFiltrado(){

let params={page:paginaActual,limit:limite};

columnas.forEach(col=>{
let v=document.getElementById("f_"+col);
if(v && v.value) params[col]=v.value;
});

for(let k in filtrosAvanzados){
if(filtrosAvanzados[k]) params[k]=filtrosAvanzados[k];
}

fetch(`/CORRECTIVOS?${new URLSearchParams(params)}`)
.then(res=>res.json())
.then(data=>{
totalPaginas=Math.ceil(data.total/limite);
renderizar(data.data);
});
}

function renderizar(data){

tabla.innerHTML="";

data.forEach(row=>{
let status=String(row.STATUS??row.ESTATUS??"").trim().toLowerCase();
let claseColor="";
if(status==="0") claseColor="status-0";
else if(status==="1") claseColor="status-1";
else if(status==="cancelado") claseColor="status-cancelado";

tabla.innerHTML+=`
<tr class="${claseColor}">
${columnas.map(c=>`<td>${row[c]??""}</td>`).join("")}
<td>
${row.TIENE_PDF
? `<button class="pdf" onclick="verPDF(${row.ID})">Ver</button>
   <button class="delete" onclick="eliminarPDF(${row.ID})">Quitar</button>`
: `<input type="file" onchange="subirPDF(${row.ID},this)">`}
</td>
<td>
<button class="edit" onclick='editar(${JSON.stringify(row)})'>Editar</button>
<button class="ver" onclick='verDetalle(${JSON.stringify(row)})'>Ver</button>
<button class="delete" onclick="eliminar(${row.ID})">Eliminar</button>
</td>
</tr>`;
});

paginaInfo.innerText=`Página ${paginaActual} de ${totalPaginas}`;
}

function guardar(){
let data={};
columnas.forEach(col=>{
let el=document.getElementById(col);
if(el) data[col]=el.value||null;
});
let url=editandoID?`/CORRECTIVO/${editandoID}`:"/CORRECTIVO";
let method=editandoID?"PUT":"POST";
fetch(url,{method:method,headers:{"Content-Type":"application/json"},body:JSON.stringify(data)})
.then(()=>{editandoID=null;limpiarFormulario();cargar();});
}

function editar(row){
editandoID=row.ID;
columnas.forEach(col=>{
let el=document.getElementById(col);
if(el) el.value=row[col]??"";
});
window.scrollTo({top:0,behavior:"smooth"});
}

function cancelarEdicion(){editandoID=null;limpiarFormulario();}
function limpiarFormulario(){columnas.forEach(col=>{let el=document.getElementById(col);if(el) el.value="";});}
function eliminar(id){fetch(`/CORRECTIVO/${id}`,{method:"DELETE"}).then(()=>cargar());}
function subirPDF(id,input){let f=input.files[0];if(!f)return;let fd=new FormData();fd.append("file",f);fetch(`/CORRECTIVO/PDF/${id}`,{method:"POST",body:fd}).then(()=>cargar());}
function verPDF(id){window.open(`/CORRECTIVO/PDF/${id}`,"_blank");}
function eliminarPDF(id){if(!confirm("¿Seguro?"))return;fetch(`/CORRECTIVO/PDF/${id}`,{method:"DELETE"}).then(()=>cargar());}

function verDetalle(row){
let cont=document.getElementById("contenidoDetalle");
cont.innerHTML="";
columnas.forEach(col=>{
cont.innerHTML+=`<div><label>${col}</label><input value="${row[col]??""}" readonly></div>`;
});
document.getElementById("modalDetalle").style.display="flex";
}

function cerrarModal(){document.getElementById("modalDetalle").style.display="none";}

function abrirFiltroAvanzado(){
let cont=document.getElementById("contenidoFiltro");
cont.innerHTML="";
columnas.forEach(col=>{
cont.innerHTML+=`<div><label>${col}</label><input id="fa_${col}"></div>`;
});
document.getElementById("modalFiltro").style.display="flex";
}

function cerrarFiltroAvanzado(){document.getElementById("modalFiltro").style.display="none";}

function aplicarFiltroAvanzado(){
filtrosAvanzados={};
columnas.forEach(col=>{
let el=document.getElementById("fa_"+col);
if(el && el.value) filtrosAvanzados[col]=el.value;
});
cerrarFiltroAvanzado();
cargarFiltrado();
}

function exportarFiltrado(){window.open(`/CORRECTIVOS/EXPORTAR?${new URLSearchParams(filtrosAvanzados)}`);}
function exportarTodo(){window.open(`/CORRECTIVOS/EXPORTAR_TODO`);}
function exportarAnio(){let a=anioExportar.value;if(!a){alert("Ingresa año");return;}window.open(`/CORRECTIVOS/EXPORTAR_ANIO?anio=${a}`);}

function siguiente(){if(paginaActual<totalPaginas){paginaActual++;cargarFiltrado();}}
function anterior(){if(paginaActual>1){paginaActual--;cargarFiltrado();}}

cargar();

</script>
</body>
</html>
