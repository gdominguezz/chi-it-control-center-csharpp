<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PRESUPUESTOS</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f1f5f9;
}

.header{
    background:#1e293b;
    color:white;
    padding:20px;
    font-size:22px;
    font-weight:bold;
}

.container{
    padding:30px;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:20px;
}

button{
    padding:20px;
    font-size:14px;
    font-weight:bold;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#2563eb;
    color:white;
    transition:0.2s;
}

button:hover{
    background:#1d4ed8;
    transform:scale(1.03);
}

.back{
    background:#dc2626;
}


.back:hover{
    background:#b91c1c;
}

/* ── BUSCADOR GLOBAL ── */
.search-bar{padding:20px 30px 0;display:flex;gap:10px;align-items:center;}
.search-bar input{flex:1;padding:12px 16px;font-size:15px;border:2px solid #2563eb;border-radius:8px;outline:none;}
.search-bar button{padding:12px 24px;font-size:14px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer;font-weight:bold;}
.search-bar button:hover{background:#1d4ed8;}
.search-bar button.limpiar{background:#64748b;}
.search-bar button.limpiar:hover{background:#475569;}
#resultadosBusqueda{margin:15px 30px;display:none;}
#resultadosBusqueda h3{color:#1e293b;margin-bottom:10px;font-size:16px;}
.modulo-resultado{background:white;border:1px solid #cbd5e1;border-radius:8px;margin-bottom:12px;overflow:hidden;}
.modulo-header{background:#1e293b;color:white;padding:10px 16px;font-weight:bold;font-size:13px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
.modulo-header .badge{background:#2563eb;border-radius:12px;padding:2px 10px;font-size:12px;}
.modulo-header .btn-ir{background:#16a34a;border:none;color:white;border-radius:5px;padding:4px 10px;cursor:pointer;font-size:11px;font-weight:bold;}
.modulo-tabla{overflow-x:auto;max-height:250px;overflow-y:auto;}
.modulo-tabla table{width:100%;border-collapse:collapse;font-size:11px;}
.modulo-tabla th{background:#f1f5f9;color:#1e293b;padding:6px 8px;border:1px solid #e2e8f0;white-space:nowrap;position:sticky;top:0;}
.modulo-tabla td{padding:5px 8px;border:1px solid #e2e8f0;white-space:nowrap;}
.modulo-tabla tr:nth-child(even){background:#f8fafc;}
.highlight{background:#fef08a;font-weight:bold;border-radius:2px;}
#spinnerBusqueda{display:none;text-align:center;padding:20px;color:#64748b;font-size:14px;}
.sin-resultados{color:#94a3b8;font-style:italic;padding:10px;text-align:center;}
</style>
</head>

<body>

<div class="header">
PRESUPUESTOS
</div>


<!-- BUSCADOR GLOBAL -->
<div class="search-bar">
    <input type="text" id="inputBusqueda" placeholder="🔍  Buscar en todos los módulos... (marca, modelo, serie, OC, proveedor, etc.)" onkeydown="if(event.key==='Enter') buscarGlobal()">
    <button onclick="buscarGlobal()">BUSCAR</button>
    <button class="limpiar" onclick="limpiarBusqueda()">LIMPIAR</button>
</div>
<div id="spinnerBusqueda">⏳ Buscando en todos los módulos...</div>
<div id="resultadosBusqueda">
    <h3 id="resumenBusqueda"></h3>
    <div id="contenidoResultados"></div>
</div>

<div class="container">

<button onclick="window.location.href='req_oc.html'">
REQ vs ORDEN DE COMPRA
</button>

<button onclick="window.location.href='ordenes_de_compra.html'">
ORDENES DE COMPRA
</button>

<button onclick="window.location.href='pantallas_nf.html'">
PANTALLAS NF
</button>

<button onclick="window.location.href='refacciones_nf.html'">
REFACCIONES NF
</button>

<button onclick="window.location.href='accesorios_nf.html'">
ACCESORIOS NF
</button>

<button onclick="window.location.href='dispositivos_nf.html'">
DISPOSITIVOS NF
</button>

<button onclick="window.location.href='inventarios.html'">
INVENTARIOS 
</button>

<button onclick="window.location.href='perifericos_nf.html'">
PERIFERICOS NF
</button>


<button onclick="window.location.href='camaras_audio.html'">
CAMARAS DE AUDIO
</button>

<button onclick="window.location.href='herramientas_nf.html'">
HERRAMIENTA NF
</button>

<button onclick="window.location.href='impresoras_nf.html'">
IMPRESORAS NF
</button>

<button onclick="window.location.href='telefonia_nf.html'">
TELEFONIA NF
</button>

<button onclick="window.location.href='consumibles_nf.html'">
CONSUMIBLES NF
</button>

<button onclick="window.location.href='radio_nf.html'">
RADIOS NF
</button>

<button onclick="window.location.href='tintas_toner_ribon_nf.html'">
TINTAS TONER RIBON NF
</button>

<button onclick="window.location.href='refacciones_red_nf.html'">
EQUIPO DE RED NF
</button>


<button class="back" onclick="window.location.href='menu.html'">
REGRESAR AL MENU PRINCIPAL
</button>

</div>

<script>
async function buscarGlobal(){
    const termino = document.getElementById("inputBusqueda").value.trim();
    if(!termino){ alert("Ingresa un término de búsqueda"); return; }

    document.getElementById("spinnerBusqueda").style.display="block";
    document.getElementById("resultadosBusqueda").style.display="none";
    document.getElementById("contenidoResultados").innerHTML="";

    try {
        const res = await fetch(`/BUSCAR_GLOBAL?q=${encodeURIComponent(termino)}`);
        const data = await res.json();

        document.getElementById("spinnerBusqueda").style.display="none";

        const cont = document.getElementById("contenidoResultados");

        if(data.modulos_con_resultados === 0){
            document.getElementById("resumenBusqueda").innerHTML =
                `❌ No se encontraron resultados para: "<em>${termino}</em>"`;
            cont.innerHTML = `<div class="sin-resultados">Ningún módulo contiene esa información.</div>`;
        } else {
            const totalGeneral = data.resultados.reduce((a,r)=>a+r.total,0);
            document.getElementById("resumenBusqueda").innerHTML =
                `✅ <strong>${totalGeneral}</strong> resultado(s) en <strong>${data.modulos_con_resultados}</strong> módulo(s) para: "<em>${termino}</em>"`;

            data.resultados.forEach(r => {
                const cols = Object.keys(r.registros[0] || {});
                const filas = r.registros.map(row =>
                    `<tr>${cols.map(c=>`<td>${resaltar(String(row[c]??""),termino)}</td>`).join("")}</tr>`
                ).join("");

                const masReg = r.total > r.registros.length
                    ? `<div style="padding:6px 10px;background:#fef9c3;font-size:11px;">
                         ⚠️ Mostrando ${r.registros.length} de ${r.total} registros. Entra al módulo para ver todos.
                       </div>` : "";

                const paginaMap = {
                    "PREVENTIVOS":"preventivos.html","CORRECTIVOS":"correctivos.html",
                    "BAJAS":"bajas.html","REQ vs OC":"req_oc.html",
                    "ORDENES DE COMPRA":"ordenes_de_compra.html","PANTALLAS NF":"pantallas_nf.html",
                    "REFACCIONES NF":"refacciones_nf.html","ACCESORIOS NF":"accesorios_nf.html",
                    "DISPOSITIVOS NF":"dispositivos_nf.html","INVENTARIOS":"inventarios.html",
                    "CAMARAS DE AUDIO":"camaras_audio.html","PERIFERICOS NF":"perifericos_nf.html",
                    "HERRAMIENTA NF":"herramientas_nf.html","IMPRESORAS NF":"impresoras_nf.html",
                    "TELEFONIA NF":"telefonia_nf.html","CONSUMIBLES NF":"consumibles_nf.html",
                    "RADIOS NF":"radio_nf.html","TINTAS TONER RIBON":"tintas_toner_ribon_nf.html",
                    "SERVICIOS PROVEEDORES":"servicios_proveedores_nf.html",
                    "DIRECTORIO PROVEEDORES":"servicios_proveedores_nf.html",
                    "EQUIPO DE RED NF":"refacciones_red_nf.html"
                };
                const pagina = paginaMap[r.modulo] || "menu.html";

                cont.innerHTML += `
                <div class="modulo-resultado">
                    <div class="modulo-header" onclick="toggleTabla(this)">
                        <span>📦 ${r.modulo}</span>
                        <span style="display:flex;gap:8px;align-items:center;">
                            <span class="badge">${r.total} registro(s)</span>
                            <button class="btn-ir" onclick="event.stopPropagation();window.location.href='${pagina}'">IR AL MÓDULO</button>
                        </span>
                    </div>
                    <div class="modulo-tabla" style="display:block;">
                        ${masReg}
                        <table>
                            <thead><tr>${cols.map(c=>`<th>${c}</th>`).join("")}</tr></thead>
                            <tbody>${filas}</tbody>
                        </table>
                    </div>
                </div>`;
            });
        }
        document.getElementById("resultadosBusqueda").style.display="block";
        document.getElementById("resultadosBusqueda").scrollIntoView({behavior:"smooth"});
    } catch(e){
        document.getElementById("spinnerBusqueda").style.display="none";
        alert("Error al buscar: " + e.message);
    }
}

function resaltar(texto, termino){
    if(!texto||!termino) return texto;
    const re = new RegExp(`(${termino.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")})`,"gi");
    return texto.replace(re,"<span class=\"highlight\">$1</span>");
}
function toggleTabla(header){
    const t=header.nextElementSibling;
    t.style.display=t.style.display==="none"?"block":"none";
}
function limpiarBusqueda(){
    document.getElementById("inputBusqueda").value="";
    document.getElementById("resultadosBusqueda").style.display="none";
    document.getElementById("spinnerBusqueda").style.display="none";
    document.getElementById("contenidoResultados").innerHTML="";
}
</script>
</body>
</html>
