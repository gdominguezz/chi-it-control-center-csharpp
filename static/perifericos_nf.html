<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PERIFERICOS NF</title>

<style>
body{
    font-family:Arial;
    margin:0;
    background:#f1f5f9;
}

.header{
    background:#1e293b;
    color:white;
    padding:15px;
    font-size:20px;
    font-weight:bold;
}

.container{
    padding:15px;
}
.back{
    background:#dc2626;
    font-style: italic; color:#ffffff;
}
.form-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:12px;
    margin-bottom:15px;
}

.field{
    display:flex;
    flex-direction:column;
}

.field label{
    font-size:11px;
    font-weight:bold;
    color:#1e293b;
    margin-bottom:4px;
    text-transform:uppercase;
    letter-spacing:0.3px;
}

.field input{
    padding:7px;
    border:1px solid #cbd5e1;
    border-radius:5px;
    font-size:12px;
    background:#f8fafc;
    transition:border-color 0.2s;
}

.field input:focus{
    outline:none;
    border-color:#2563eb;
    background:white;
    box-shadow:0 0 0 2px rgba(37,99,235,0.15);
}

button{
    padding:6px 12px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:12px;
    font-weight:bold;
    margin-right:5px;
}

.save{background:#16a34a;color:white;}
.cancel{background:#64748b;color:white;}
.delete{background:#dc2626;color:white;}
.edit{background:#f59e0b;color:white;}
.pdf{background:#2563eb;color:white;}
.export{background:#7c3aed;color:white;}

.btn-bar{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    gap:8px;
    margin-bottom:12px;
}

.btn-bar input[type="number"]{
    padding:6px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:12px;
    width:110px;
}

.table-container{
    width:100%;
    height:500px;
    overflow:auto;
    border:1px solid #ccc;
    background:white;
}

table{
    border-collapse:collapse;
    min-width:3200px;
    font-size:11px;
}

th,td{
    border:1px solid #ccc;
    padding:6px;
    white-space:nowrap;
    text-align:center;
}

th{
    background:#1e293b;
    color:white;
    position:sticky;
    top:0;
    z-index:2;
}

.filter-row input{
    width:100%;
    font-size:11px;
}

.pagination{
    margin-top:10px;
}
</style>
</head>

<body>

<div class="header">PERIFERICOS NF</div>

<div class="container">

<div class="form-grid">

<div class="field">
    <label>ID Unico</label>
    <input id="ID_UNICO">
</div>

<div class="field">
    <label>OC</label>
    <input id="OC">
</div>

<div class="field">
    <label>Folio Inventario</label>
    <input id="FOLIO_INVENTARIO">
</div>

<div class="field">
    <label>Fecha Entrada</label>
    <input id="FECHA_ENTRADA" type="date">
</div>

<div class="field">
    <label>Recibido Por</label>
    <input id="RECIBIDO_POR">
</div>

<div class="field">
    <label>Subcategoría</label>
    <input id="SUBCATEGORIA">
</div>

<div class="field">
    <label>Tipo</label>
    <input id="TIPO">
</div>

<div class="field">
    <label>Marca</label>
    <input id="MARCA">
</div>

<div class="field">
    <label>Modelo</label>
    <input id="MODELO">
</div>

<div class="field">
    <label>Número de Serie</label>
    <input id="NUMERO_DE_SERIE">
</div>

<div class="field">
    <label>Proveedor</label>
    <input id="PROVEEDOR">
</div>

<div class="field">
    <label>Costo Pesos</label>
    <input id="COSTO_PESOS" type="number" step="0.01">
</div>

<div class="field">
    <label>Estado</label>
    <input id="ESTADO">
</div>

<div class="field">
    <label>Destino</label>
    <input id="DESTINO">
</div>

<div class="field">
    <label>Disponible</label>
    <input id="DISPONIBLE">
</div>

<div class="field">
    <label>Fecha Salida</label>
    <input id="FECHA_SALIDA" type="date">
</div>

<div class="field">
    <label>Destino / Planta</label>
    <input id="DESTINO_PLANTA">
</div>

<div class="field">
    <label>Asignado A</label>
    <input id="ASIGNADO_A">
</div>

<div class="field">
    <label>Personal IT que Asigna</label>
    <input id="PERSONAL_IT_ASIGNA">
</div>

</div>

<div class="btn-bar">
    <button class="save" onclick="guardar()">GUARDAR / ACTUALIZAR</button>
    <button class="cancel" onclick="cancelarEdicion()">CANCELAR</button>
</div>

<div class="btn-bar">
    <button class="export" onclick="exportarFiltrado()">Exportar Filtrado</button>
    <button class="export" onclick="exportarTodo()">Exportar Todo</button>
    <input type="number" id="anioExportar" placeholder="Año (ej: 2026)">
    <button class="export" onclick="exportarPorAnio()">Exportar por Año</button>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>ID</th>
<th>ID UNICO</th>
<th>OC</th>
<th>FOLIO INV</th>
<th>FECHA ENTRADA</th>
<th>RECIBIDO</th>
<th>SUBCATEGORIA</th>
<th>TIPO</th>
<th>MARCA</th>
<th>MODELO</th>
<th>NO. SERIE</th>
<th>PROVEEDOR</th>
<th>COSTO PESOS</th>
<th>ESTADO</th>
<th>DESTINO</th>
<th>DISPONIBLE</th>
<th>FECHA SALIDA</th>
<th>DESTINO PLANTA</th>
<th>ASIGNADO A</th>
<th>PERSONAL IT</th>
<th>PDF</th>
<th>ACCIONES</th>
</tr>

<tr class="filter-row">
<th></th>
<th><input oninput="filtrar()"></th><!-- f[0]  ID_UNICO -->
<th><input oninput="filtrar()"></th><!-- f[1]  OC -->
<th><input oninput="filtrar()"></th><!-- f[2]  FOLIO_INVENTARIO -->
<th><input oninput="filtrar()"></th><!-- f[3]  FECHA_ENTRADA -->
<th><input oninput="filtrar()"></th><!-- f[4]  RECIBIDO_POR -->
<th><input oninput="filtrar()"></th><!-- f[5]  SUBCATEGORIA -->
<th><input oninput="filtrar()"></th><!-- f[6]  TIPO -->
<th><input oninput="filtrar()"></th><!-- f[7]  MARCA -->
<th><input oninput="filtrar()"></th><!-- f[8]  MODELO -->
<th><input oninput="filtrar()"></th><!-- f[9]  NUMERO_DE_SERIE -->
<th><input oninput="filtrar()"></th><!-- f[10] PROVEEDOR -->
<th><input oninput="filtrar()"></th><!-- f[11] COSTO_PESOS -->
<th><input oninput="filtrar()"></th><!-- f[12] ESTADO -->
<th><input oninput="filtrar()"></th><!-- f[13] DESTINO -->
<th><input oninput="filtrar()"></th><!-- f[14] DISPONIBLE -->
<th><input oninput="filtrar()"></th><!-- f[15] FECHA_SALIDA -->
<th><input oninput="filtrar()"></th><!-- f[16] DESTINO_PLANTA -->
<th><input oninput="filtrar()"></th><!-- f[17] ASIGNADO_A -->
<th><input oninput="filtrar()"></th><!-- f[18] PERSONAL_IT_ASIGNA -->
<th></th>
<th></th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

<div class="pagination">
<button onclick="anterior()">Anterior</button>
<span id="paginaInfo"></span>
<button onclick="siguiente()">Siguiente</button>
<button class="back" onclick="window.location.href='presupuestos_menu.html'">
REGRESAR A PRESUPUESTOS
</button>
</div>

</div>

<script>

let paginaActual = 1;
let limite = 10;
let totalRegistros = 0;
let editandoID = null;

function guardar(){
    let data = {
        ID_UNICO:           ID_UNICO.value           || null,
        OC:                 OC.value                 || null,
        FOLIO_INVENTARIO:   FOLIO_INVENTARIO.value   || null,
        FECHA_ENTRADA:      FECHA_ENTRADA.value      || null,
        RECIBIDO_POR:       RECIBIDO_POR.value       || null,
        SUBCATEGORIA:       SUBCATEGORIA.value       || null,
        TIPO:               TIPO.value               || null,
        MARCA:              MARCA.value              || null,
        MODELO:             MODELO.value             || null,
        NUMERO_DE_SERIE:    NUMERO_DE_SERIE.value    || null,
        PROVEEDOR:          PROVEEDOR.value          || null,
        COSTO_PESOS:        COSTO_PESOS.value ? parseFloat(COSTO_PESOS.value) : null,
        ESTADO:             ESTADO.value             || null,
        DESTINO:            DESTINO.value            || null,
        DISPONIBLE:         DISPONIBLE.value         || null,
        FECHA_SALIDA:       FECHA_SALIDA.value       || null,
        DESTINO_PLANTA:     DESTINO_PLANTA.value     || null,
        ASIGNADO_A:         ASIGNADO_A.value         || null,
        PERSONAL_IT_ASIGNA: PERSONAL_IT_ASIGNA.value || null
    };

    if(editandoID){
        fetch(`/PERIFERICOS_NF/${editandoID}`,{
            method:"PUT",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify(data)
        }).then(()=>{ editandoID=null; limpiarFormulario(); cargar(); });
    } else {
        fetch("/PERIFERICOS_NF",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify(data)
        }).then(()=>{ limpiarFormulario(); cargar(); });
    }
}

function limpiarFormulario(){
    document.querySelectorAll(".form-grid input").forEach(i=>i.value="");
}

function cancelarEdicion(){
    editandoID = null;
    limpiarFormulario();
}

function obtenerParametros(){
    let f = document.querySelectorAll(".filter-row input");
    return new URLSearchParams({
        page:               paginaActual,
        limit:              limite,
        ID_UNICO:           f[0].value,
        OC:                 f[1].value,
        FOLIO_INVENTARIO:   f[2].value,
        FECHA_ENTRADA:      f[3].value,
        RECIBIDO_POR:       f[4].value,
        SUBCATEGORIA:       f[5].value,
        TIPO:               f[6].value,
        MARCA:              f[7].value,
        MODELO:             f[8].value,
        NUMERO_DE_SERIE:    f[9].value,
        PROVEEDOR:          f[10].value,
        COSTO_PESOS:        f[11].value,
        ESTADO:             f[12].value,
        DESTINO:            f[13].value,
        DISPONIBLE:         f[14].value,
        FECHA_SALIDA:       f[15].value,
        DESTINO_PLANTA:     f[16].value,
        ASIGNADO_A:         f[17].value,
        PERSONAL_IT_ASIGNA: f[18].value
    });
}

function cargar(){
    let params = obtenerParametros();
    fetch(`/PERIFERICOS_NF?${params.toString()}`)
    .then(res=>res.json())
    .then(resp=>{
        totalRegistros = resp.total;
        renderizar(resp.data);
    });
}

function renderizar(datos){
    tabla.innerHTML="";
    datos.forEach(row=>{
        tabla.innerHTML+=`
        <tr>
        <td>${row.ID}</td>
        <td>${row.ID_UNICO??""}</td>
        <td>${row.OC??""}</td>
        <td>${row.FOLIO_INVENTARIO??""}</td>
        <td>${row.FECHA_ENTRADA??""}</td>
        <td>${row.RECIBIDO_POR??""}</td>
        <td>${row.SUBCATEGORIA??""}</td>
        <td>${row.TIPO??""}</td>
        <td>${row.MARCA??""}</td>
        <td>${row.MODELO??""}</td>
        <td>${row.NUMERO_DE_SERIE??""}</td>
        <td>${row.PROVEEDOR??""}</td>
        <td>${row.COSTO_PESOS??""}</td>
        <td>${row.ESTADO??""}</td>
        <td>${row.DESTINO??""}</td>
        <td>${row.DISPONIBLE??""}</td>
        <td>${row.FECHA_SALIDA??""}</td>
        <td>${row.DESTINO_PLANTA??""}</td>
        <td>${row.ASIGNADO_A??""}</td>
        <td>${row.PERSONAL_IT_ASIGNA??""}</td>
        <td>
        ${row.TIENE_PDF
        ? `<button class="pdf" onclick="verPDF(${row.ID})">Ver PDF</button>
           <button class="delete" onclick="eliminarPDF(${row.ID})">Quitar</button>`
        : `<input type="file" onchange="subirPDF(${row.ID},this)">`
        }
        </td>
        <td>
        <button class="edit" onclick='editar(${JSON.stringify(row)})'>Editar</button>
        <button class="delete" onclick="eliminar(${row.ID})">Eliminar</button>
        </td>
        </tr>`;
    });
    paginaInfo.innerText=`Página ${paginaActual} de ${Math.ceil(totalRegistros/limite)}`;
}

function editar(row){
    editandoID = row.ID;
    Object.keys(row).forEach(key=>{
        let el = document.getElementById(key);
        if(el) el.value = row[key] ?? "";
    });
    window.scrollTo({top:0, behavior:"smooth"});
}

function eliminar(id){
    if(!confirm("¿Eliminar este registro?")) return;
    fetch(`/PERIFERICOS_NF/${id}`,{method:"DELETE"}).then(()=>cargar());
}

function subirPDF(id, input){
    let file = input.files[0];
    if(!file) return;
    let formData = new FormData();
    formData.append("file", file);
    fetch(`/PERIFERICOS_NF/PDF/${id}`,{method:"POST", body:formData})
    .then(()=>cargar());
}

function verPDF(id){
    window.open(`/PERIFERICOS_NF/PDF/${id}`,"_blank");
}

function eliminarPDF(id){
    if(!confirm("¿Seguro que deseas eliminar el PDF?")) return;
    fetch(`/PERIFERICOS_NF/PDF/${id}`,{method:"DELETE"})
    .then(()=>cargar());
}

function filtrar(){
    paginaActual = 1;
    cargar();
}

function exportarFiltrado(){
    let params = obtenerParametros();
    window.open(`/PERIFERICOS_NF/EXPORTAR?${params.toString()}`);
}

function exportarTodo(){
    window.open(`/PERIFERICOS_NF/EXPORTAR_TODO`);
}

function exportarPorAnio(){
    let anio = document.getElementById("anioExportar").value;
    if(!anio){ alert("Ingresa un año"); return; }
    window.open(`/PERIFERICOS_NF/EXPORTAR_ANIO?anio=${anio}`);
}

function siguiente(){
    if(paginaActual*limite<totalRegistros){ paginaActual++; cargar(); }
}

function anterior(){
    if(paginaActual>1){ paginaActual--; cargar(); }
}

cargar();

</script>

</body>
</html>
