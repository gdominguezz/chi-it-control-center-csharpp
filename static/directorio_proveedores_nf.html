<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DIRECTORIO PROVEEDORES NF</title>
<style>
body{font-family:Arial;margin:0;background:#f1f5f9;}
.header{background:#2d0a66;color:white;padding:15px;font-size:20px;font-weight:bold;}
.container{padding:15px;}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:15px;}
.field{display:flex;flex-direction:column;}
.field label{font-size:11px;font-weight:bold;color:#1e293b;margin-bottom:4px;text-transform:uppercase;}
.field input,.field textarea{padding:7px;border:1px solid #cbd5e1;border-radius:5px;font-size:12px;background:#f8fafc;}
.field textarea{resize:vertical;min-height:60px;}
.field input:focus,.field textarea:focus{outline:none;border-color:#2d0a66;background:white;}
button{padding:6px 12px;border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:bold;margin-right:5px;}
.save{background:#16a34a;color:white;}.cancel{background:#64748b;color:white;}.delete{background:#dc2626;color:white;}
.edit{background:#f59e0b;color:white;}.export{background:#7c3aed;color:white;}
.btn-bar{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:12px;}
.table-container{width:100%;height:500px;overflow:auto;border:1px solid #ccc;background:white;}
table{border-collapse:collapse;min-width:1200px;font-size:11px;}
th,td{border:1px solid #ccc;padding:6px;white-space:nowrap;text-align:center;}
th{background:#2d0a66;color:white;position:sticky;top:0;z-index:2;}
td.correo{max-width:200px;white-space:normal;word-break:break-all;}
.filter-row input{width:100%;font-size:11px;}
.pagination{margin-top:10px;}
.back{
    background:#dc2626;
    font-style: italic; color:#ffffff;
}

</style>
</head>
<body>
<div class="header">DIRECTORIO PROVEEDORES NF</div>
<div class="container">

<div class="form-grid">
  <div class="field"><label>Compañia</label><input id="COMPANIA"></div>
  <div class="field"><label>RFC</label><input id="RFC"></div>
  <div class="field"><label>Contacto</label><input id="CONTACTO"></div>
  <div class="field"><label>Celular</label><input id="CEL"></div>
  <div class="field" style="grid-column:span 2"><label>Correo</label><input id="CORREO"></div>
  <div class="field" style="grid-column:span 3"><label>Notas</label><textarea id="NOTAS"></textarea></div>
</div>

<div class="btn-bar">
  <button class="save" onclick="guardar()">GUARDAR / ACTUALIZAR</button>
  <button class="cancel" onclick="cancelarEdicion()">CANCELAR</button>
</div>
<div class="btn-bar">
  <button class="export" onclick="exportarTodo()">Exportar Todo</button>
</div>

<div class="table-container">
<table>
<thead>
<tr>
  <th>ID</th><th>COMPAÑIA</th><th>RFC</th><th>CONTACTO</th>
  <th>CELULAR</th><th>CORREO</th><th>NOTAS</th><th>ACCIONES</th>
</tr>
<tr class="filter-row">
  <th></th>
  <th><input oninput="filtrar()"></th><!-- f[0] COMPANIA -->
  <th><input oninput="filtrar()"></th><!-- f[1] RFC -->
  <th><input oninput="filtrar()"></th><!-- f[2] CONTACTO -->
  <th><input oninput="filtrar()"></th><!-- f[3] CEL -->
  <th><input oninput="filtrar()"></th><!-- f[4] CORREO -->
  <th><input oninput="filtrar()"></th><!-- f[5] NOTAS -->
  <th></th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

<div class="pagination">
  <button onclick="anterior()">Anterior</button>
  <span id="paginaInfo"></span>
  <button onclick="siguiente()">Siguiente</button>
  <button class="back" onclick="window.location.href='menu.html'">
REGRESAR AL MENU PRINCIPAL
</button>
</div>
</div>

<script>
let paginaActual=1,limite=10,totalRegistros=0,editandoID=null;

function guardar(){
    let ids=['COMPANIA','RFC','CONTACTO','CEL','CORREO','NOTAS'];
    let data={};
    ids.forEach(k=>{ let el=document.getElementById(k); data[k]=el&&el.value?el.value:null; });
    if(editandoID){
        fetch(`/DIRECTORIO_PROVEEDORES_NF/${editandoID}`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)})
        .then(()=>{editandoID=null;limpiarFormulario();cargar();});
    } else {
        fetch("/DIRECTORIO_PROVEEDORES_NF",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)})
        .then(()=>{limpiarFormulario();cargar();});
    }
}

function limpiarFormulario(){ document.querySelectorAll(".form-grid input,.form-grid textarea").forEach(i=>i.value=""); }
function cancelarEdicion(){ editandoID=null; limpiarFormulario(); }

function obtenerParametros(){
    let f=document.querySelectorAll(".filter-row input");
    return new URLSearchParams({
        page:paginaActual,limit:limite,
        COMPANIA:f[0].value,RFC:f[1].value,CONTACTO:f[2].value,
        CEL:f[3].value,CORREO:f[4].value,NOTAS:f[5].value
    });
}

function cargar(){
    fetch(`/DIRECTORIO_PROVEEDORES_NF?${obtenerParametros().toString()}`)
    .then(r=>r.json()).then(resp=>{totalRegistros=resp.total;renderizar(resp.data);});
}

function renderizar(datos){
    tabla.innerHTML="";
    datos.forEach(row=>{
        tabla.innerHTML+=`<tr>
        <td>${row.ID}</td>
        <td>${row.COMPANIA??""}</td>
        <td>${row.RFC??""}</td>
        <td>${row.CONTACTO??""}</td>
        <td>${row.CEL??""}</td>
        <td class="correo">${row.CORREO??""}</td>
        <td>${row.NOTAS??""}</td>
        <td><button class="edit" onclick='editar(${JSON.stringify(row)})'>Editar</button>
        <button class="delete" onclick="eliminar(${row.ID})">Eliminar</button></td>
        </tr>`;
    });
    paginaInfo.innerText=`Pagina ${paginaActual} de ${Math.ceil(totalRegistros/limite)}`;
}

function editar(row){ editandoID=row.ID; Object.keys(row).forEach(k=>{let el=document.getElementById(k);if(el)el.value=row[k]??""}); window.scrollTo({top:0,behavior:"smooth"}); }
function eliminar(id){ if(!confirm("Eliminar?")) return; fetch(`/DIRECTORIO_PROVEEDORES_NF/${id}`,{method:"DELETE"}).then(()=>cargar()); }
function filtrar(){ paginaActual=1; cargar(); }
function exportarTodo(){ window.open(`/DIRECTORIO_PROVEEDORES_NF/EXPORTAR_TODO`); }
function siguiente(){ if(paginaActual*limite<totalRegistros){paginaActual++;cargar();} }
function anterior(){ if(paginaActual>1){paginaActual--;cargar();} }
cargar();
</script>
</body>
</html>
